<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gym Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --accent: #c8f060;
    --accent2: #a0d040;
    --danger: #ff5a5a;
    --success: #4caf7d;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; }
  body { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  header {
    padding: 18px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .sync-status {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
  }
  .sync-dot.ok { background: var(--success); }
  .sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.err { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .tabs {
    display: flex;
    padding: 12px 16px 0;
    gap: 0;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 8px 14px 10px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .date-label { font-size: 12px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; }
  .date-input {
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 5px 8px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    color: var(--text);
  }

  .ex-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
  }
  .ex-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 8px;
  }
  .ex-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .ex-ref {
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 2px;
  }
  .pr-badge {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(200, 240, 96, 0.1);
    color: var(--accent);
    border: 1px solid rgba(200, 240, 96, 0.2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .add-set {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 3px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .add-set:active { background: var(--bg3); }

  .sets-head {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 24px;
    gap: 4px;
    margin-bottom: 4px;
  }
  .sets-head span {
    font-size: 10px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
  }
  .set-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 24px;
    gap: 4px;
    margin-bottom: 4px;
    align-items: center;
  }
  .set-num {
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
  }
  .set-input {
    width: 100%;
    font-size: 14px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 6px 4px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg3);
    color: var(--text);
    text-align: center;
    -webkit-appearance: none;
  }
  .set-input:focus { outline: none; border-color: var(--border2); }
  .del-set {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 16px;
    line-height: 1;
    text-align: center;
    padding: 0;
  }
  .del-set:active { color: var(--danger); }

  .history-block { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  .hist-title { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-bottom: 6px; }
  .hist-entry {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text2);
    margin-bottom: 4px;
    line-height: 1.5;
  }
  .hist-date { color: var(--text3); }
  .empty-hist { font-size: 11px; color: var(--text3); font-style: italic; }

  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    max-width: 480px;
    margin: 0 auto;
  }
  .btn {
    flex: 1;
    padding: 11px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    transition: background 0.1s;
  }
  .btn:active { background: var(--bg3); }
  .btn.primary {
    background: var(--accent);
    color: #0f0f0f;
    border-color: transparent;
    font-weight: 500;
  }
  .btn.primary:active { background: var(--accent2); }

  .toast {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 8px 16px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">GYM_TRACKER</div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">—</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchDay('mon')">ПН · Грудь/Бицепс</button>
  <button class="tab" onclick="switchDay('thu')">ЧТ · Ноги/Плечи</button>
  <button class="tab" onclick="switchDay('sat')">СБ · Спина/Трицепс</button>
</div>

<div id="panel-mon" class="panel active"></div>
<div id="panel-thu" class="panel"></div>
<div id="panel-sat" class="panel"></div>

<div class="bottom-bar">
  <button class="btn" onclick="clearDay()">Очистить</button>
  <button class="btn primary" onclick="saveDay()">Сохранить тренировку</button>
</div>

<div class="toast" id="toast"></div>

<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbxh6pQdnmsfwCaU_pi0KltLT08hK3X6KTAgxvaS17hphwXb4VDYdTxAyeoEVWSaE_AQ2w/exec";

const DAYS = {
  mon: {
    exercises: [
      { id:"hyper_mon", name:"Гиперэкстензия", unit:"кг", ref:"" },
      { id:"chest_press", name:"Жим грудь", unit:"кг", ref:"ориент: 5 кг" },
      { id:"db_press", name:"Жим гантелей", unit:"кг", ref:"ориент: 12–14 кг" },
      { id:"butterfly", name:"Бабочка", unit:"кг", ref:"ориент: 25–30 кг" },
      { id:"front_raise", name:"Перед собой блин", unit:"кг", ref:"ориент: 5–6 кг" },
      { id:"bicep_ez", name:"Подъём на бицепс EZ", unit:"кг", ref:"" },
    ]
  },
  thu: {
    exercises: [
      { id:"hyper_thu", name:"Гиперэкстензия", unit:"кг", ref:"ориент: 5–10 кг" },
      { id:"ohp", name:"Жим стоя/сидя", unit:"кг", ref:"ориент: 9 ган / 12,5 Смит" },
      { id:"laterals", name:"Махи + перед собой", unit:"кг", ref:"ориент: 5–6 кг" },
      { id:"lunges", name:"Выпады", unit:"кг", ref:"ориент: 7,5 кг" },
      { id:"hack", name:"Гак-присед", unit:"кг", ref:"ориент: 35 кг" },
      { id:"leg_ext", name:"Разгибание ног", unit:"кг", ref:"ориент: 25–35 кг" },
    ]
  },
  sat: {
    exercises: [
      { id:"hyper_sat", name:"Гиперэкстензия", unit:"кг", ref:"ориент: 5–10 кг" },
      { id:"pullups", name:"Подтягивания (резинка)", unit:"повт", ref:"ориент: 4×10-8" },
      { id:"tbar", name:"Тяга Т-грифа", unit:"кг", ref:"ориент: 10 кг · 3×12" },
      { id:"horiz_row", name:"Горизонтальная тяга", unit:"ф", ref:"ориент: 60 ф · 3×12" },
      { id:"tri_db", name:"Трицепс гантель сидя", unit:"кг", ref:"ориент: 12 кг · 4×12" },
      { id:"tri_rope", name:"Трицепс канат", unit:"ф", ref:"ориент: 50–60 ф · 3×14" },
      { id:"plank", name:"Планка на локтях", unit:"сек", ref:"ориент: 3×60 сек" },
    ]
  }
};

let currentDay = "mon";
let localData = {};
try { localData = JSON.parse(localStorage.getItem("gym_v3") || "{}"); } catch(e) {}

function saveLocal() {
  try { localStorage.setItem("gym_v3", JSON.stringify(localData)); } catch(e) {}
}

function setSyncStatus(state, text) {
  const dot = document.getElementById("sync-dot");
  const label = document.getElementById("sync-text");
  dot.className = "sync-dot " + state;
  label.textContent = text;
}

async function gsGet(key) {
  try {
    setSyncStatus("loading", "загрузка...");
    const r = await fetch(GS_URL + "?key=" + encodeURIComponent(key));
    const text = await r.text();
    setSyncStatus("ok", "синхр.");
    return text ? JSON.parse(text) : null;
  } catch(e) {
    setSyncStatus("err", "нет связи");
    return null;
  }
}

async function gsSet(key, value) {
  try {
    setSyncStatus("loading", "сохр...");
    await fetch(GS_URL, {
      method: "POST",
      body: JSON.stringify({ key, value: JSON.stringify(value) }),
      headers: { "Content-Type": "application/json" }
    });
    setSyncStatus("ok", "сохранено");
  } catch(e) {
    setSyncStatus("err", "нет связи");
  }
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function getExData(dayKey, exId) {
  if (!localData[dayKey]) localData[dayKey] = { date: todayStr(), exercises: {} };
  if (!localData[dayKey].exercises[exId]) localData[dayKey].exercises[exId] = { sets:[{weight:"",reps:""}] };
  return localData[dayKey].exercises[exId];
}

function renderPanel(dayKey) {
  const day = DAYS[dayKey];
  const panel = document.getElementById("panel-" + dayKey);
  const savedDate = (localData[dayKey] || {}).date || todayStr();
  const hist = localData[dayKey + "_hist"] || {};

  let html = `<div class="date-row">
    <span class="date-label">дата:</span>
    <input type="date" class="date-input" id="date-${dayKey}" value="${savedDate}" onchange="localData['${dayKey}'].date=this.value;saveLocal()">
  </div>`;

  day.exercises.forEach(ex => {
    const d = getExData(dayKey, ex.id);
    const exHist = hist[ex.id] || [];
    const pr = calcPR(exHist, ex.unit);

    const isSimple = ex.unit === "сек" || ex.unit === "повт";
    const col1head = isSimple ? (ex.unit === "сек" ? "сек" : "повт") : "вес " + ex.unit;
    const col2head = isSimple ? "" : "повт";

    html += `<div class="ex-card">
      <div class="ex-header">
        <div>
          <div class="ex-name">${ex.name}</div>
          ${ex.ref ? `<div class="ex-ref">${ex.ref}</div>` : ""}
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
          ${pr ? `<span class="pr-badge">PR ${pr}</span>` : ""}
          <button class="add-set" onclick="addSet('${dayKey}','${ex.id}')">+ подход</button>
        </div>
      </div>
      <div class="sets-head">
        <span>#</span>
        <span>${col1head}</span>
        <span>${col2head}</span>
        <span></span>
      </div>
      <div id="sets-${ex.id}">`;

    d.sets.forEach((s, i) => {
      html += setRowHTML(dayKey, ex.id, i, s, ex.unit);
    });

    html += `</div>`;

    if (exHist.length > 0) {
      html += `<div class="history-block"><div class="hist-title">последние тренировки</div>`;
      exHist.slice(-3).reverse().forEach(h => {
        const setsStr = h.sets.map((s,i) => `${i+1}:${fmtSet(s,ex.unit)}`).join(" ");
        html += `<div class="hist-entry"><span class="hist-date">${h.date}</span>  ${setsStr}</div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="history-block"><div class="empty-hist">история пуста</div></div>`;
    }

    html += `</div>`;
  });

  panel.innerHTML = html;
}

function setRowHTML(dayKey, exId, i, s, unit) {
  const isSimple = unit === "сек" || unit === "повт";
  const col1 = `<input class="set-input" type="number" min="0" step="0.5" placeholder="${isSimple ? (unit==='сек'?'сек':'повт') : 'кг'}" value="${isSimple ? (s.reps||'') : (s.weight||'')}" oninput="updateSet('${dayKey}','${exId}',${i},'${isSimple?'reps':'weight'}',this.value)">`;
  const col2 = isSimple ? `<div></div>` : `<input class="set-input" type="number" min="0" step="1" placeholder="повт" value="${s.reps||''}" oninput="updateSet('${dayKey}','${exId}',${i},'reps',this.value)">`;
  return `<div class="set-row">
    <div class="set-num">${i+1}</div>
    ${col1}
    ${col2}
    <button class="del-set" onclick="delSet('${dayKey}','${exId}',${i})">×</button>
  </div>`;
}

function updateSet(dayKey, exId, i, field, val) {
  const d = getExData(dayKey, exId);
  if (!d.sets[i]) d.sets[i] = {};
  d.sets[i][field] = val;
  saveLocal();
}

function addSet(dayKey, exId) {
  const d = getExData(dayKey, exId);
  const ex = DAYS[dayKey].exercises.find(e => e.id === exId);
  d.sets.push({weight:"", reps:""});
  saveLocal();
  const container = document.getElementById("sets-" + exId);
  const i = d.sets.length - 1;
  container.insertAdjacentHTML("beforeend", setRowHTML(dayKey, exId, i, {weight:"",reps:""}, ex.unit));
}

function delSet(dayKey, exId, i) {
  const d = getExData(dayKey, exId);
  if (d.sets.length <= 1) return;
  d.sets.splice(i, 1);
  saveLocal();
  renderPanel(dayKey);
}

function fmtSet(s, unit) {
  if (unit === "сек") return (s.reps||"?") + "с";
  if (unit === "повт") return (s.reps||"?") + "п";
  return (s.weight||"?") + unit + "×" + (s.reps||"?");
}

function calcPR(hist, unit) {
  if (!hist.length) return null;
  if (unit === "сек" || unit === "повт") {
    const max = Math.max(...hist.flatMap(h => h.sets.map(s => parseFloat(s.reps)||0)));
    return max > 0 ? max + " " + unit : null;
  }
  const max = Math.max(...hist.flatMap(h => h.sets.map(s => parseFloat(s.weight)||0)));
  return max > 0 ? max + " " + unit : null;
}

async function saveDay() {
  const dayKey = currentDay;
  if (!localData[dayKey]) localData[dayKey] = { date: todayStr(), exercises: {} };
  const date = localData[dayKey].date || todayStr();

  if (!localData[dayKey + "_hist"]) localData[dayKey + "_hist"] = {};
  DAYS[dayKey].exercises.forEach(ex => {
    const d = getExData(dayKey, ex.id);
    if (!localData[dayKey + "_hist"][ex.id]) localData[dayKey + "_hist"][ex.id] = [];
    const hist = localData[dayKey + "_hist"][ex.id];
    const idx = hist.findIndex(h => h.date === date);
    const entry = { date, sets: JSON.parse(JSON.stringify(d.sets)) };
    if (idx >= 0) hist[idx] = entry;
    else hist.push(entry);
    if (hist.length > 15) hist.splice(0, hist.length - 15);
  });

  saveLocal();

  await gsSet("data_" + dayKey, localData[dayKey]);
  await gsSet("hist_" + dayKey, localData[dayKey + "_hist"]);

  showToast("сохранено ✓");
  renderPanel(dayKey);
}

async function loadFromCloud() {
  for (const dayKey of ["mon","thu","sat"]) {
    const d = await gsGet("data_" + dayKey);
    const h = await gsGet("hist_" + dayKey);
    if (d) localData[dayKey] = d;
    if (h) localData[dayKey + "_hist"] = h;
  }
  saveLocal();
  renderPanel(currentDay);
}

function clearDay() {
  const dayKey = currentDay;
  if (!localData[dayKey]) return;
  DAYS[dayKey].exercises.forEach(ex => {
    localData[dayKey].exercises[ex.id] = { sets:[{weight:"",reps:""}] };
  });
  saveLocal();
  renderPanel(dayKey);
}

function switchDay(key) {
  currentDay = key;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["mon","thu","sat"][i] === key);
  });
  document.querySelectorAll(".panel").forEach((p,i) => {
    p.classList.toggle("active", ["mon","thu","sat"][i] === key);
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

["mon","thu","sat"].forEach(d => renderPanel(d));
setSyncStatus("loading", "загрузка...");
loadFromCloud();
</script>
</body>
</html>
