<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gym Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#e8e8e8;--text2:#888;--text3:#555;
  --accent:#c8f060;--accent2:#a0d040;
  --danger:#ff5a5a;--success:#4caf7d;
  --up:#4caf7d;--dn:#ff5a5a;--eq:#666;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;}
body{max-width:480px;margin:0 auto;padding-bottom:80px;}
header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--accent);}
.sw{display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.dot.ok{background:var(--success);}
.dot.busy{background:var(--accent);animation:blink 1s infinite;}
.dot.err{background:var(--danger);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:10px 16px;font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.nb.active{color:var(--accent);border-bottom-color:var(--accent);}
.page{display:none;padding:16px;}
.page.active{display:block;}
.chips{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.chip{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;}
.chip.on{background:rgba(200,240,96,.12);color:var(--accent);border-color:rgba(200,240,96,.3);}
.chip.dim{color:var(--text3);}
.drow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.dlbl{font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace;}
.dinp{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;}
.cn{font-size:13px;font-weight:500;}
.ca{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.badge{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:20px;background:rgba(200,240,96,.1);color:var(--accent);border:1px solid rgba(200,240,96,.2);white-space:nowrap;}
.bxs{font-size:11px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;}
.bxs:active{background:var(--bg3);}
.bxs.on{color:var(--accent);border-color:rgba(200,240,96,.3);background:rgba(200,240,96,.08);}
.binfo{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:8px;}
.sh{display:grid;grid-template-columns:28px 1fr 1fr 24px;gap:4px;margin-bottom:4px;}
.sh span{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-align:center;}
.sr{display:grid;grid-template-columns:28px 1fr 1fr 24px;gap:4px;margin-bottom:4px;align-items:center;}
.sn{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-align:center;}
.si{width:100%;font-size:14px;font-family:'IBM Plex Mono',monospace;padding:6px 4px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg3);color:var(--text);text-align:center;-webkit-appearance:none;}
.si:focus{outline:none;border-color:var(--border2);}
.si.sm{font-size:12px;}
.ds{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:0;}
.ds:active{color:var(--danger);}
.vbl{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.vr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.vlbl{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.vval{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text2);}
.vd{font-size:11px;font-family:'IBM Plex Mono',monospace;}
.vd.up{color:var(--up);}
.vd.dn{color:var(--dn);}
.vd.eq{color:var(--eq);}
.hbl{margin-top:8px;}
.htog{display:flex;align-items:center;gap:6px;cursor:pointer;background:none;border:none;padding:4px 0;color:var(--text3);font-size:11px;font-family:'IBM Plex Mono',monospace;}
.harr{font-size:9px;transition:transform .2s;}
.harr.open{transform:rotate(90deg);}
.hlist{margin-top:6px;display:none;}
.hlist.open{display:block;}
.he{background:var(--bg3);border-radius:var(--rs);padding:7px 10px;margin-bottom:5px;}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.hd{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.hm{display:flex;align-items:center;gap:8px;}
.hv{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text2);}
.hs{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text2);line-height:1.7;}
.sk{color:var(--text3);font-style:italic;}
.dh{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0 2px;line-height:1;}
.dh:active{color:var(--danger);}
.mb{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);cursor:pointer;background:none;border:none;padding:2px 0;text-decoration:underline;text-underline-offset:2px;}
.ss{margin-bottom:24px;}
.st{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.slbl{font-size:13px;}
.ssub{font-size:11px;color:var(--text3);margin-top:2px;}
.sinp{width:90px;font-size:13px;font-family:'IBM Plex Mono',monospace;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);text-align:right;}
.sinp:focus{outline:none;border-color:var(--accent);}
.editor{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:12px;}
.einp{width:100%;font-size:13px;font-family:'IBM Plex Mono',monospace;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);margin-bottom:8px;}
.einp:focus{outline:none;border-color:var(--accent);}
.esel{width:100%;font-size:12px;font-family:'IBM Plex Mono',monospace;padding:6px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);margin-bottom:8px;}
.esel:focus{outline:none;border-color:var(--accent);}
.flags{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
.flags label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;}
.flags input[type=checkbox]{accent-color:var(--accent);}
.ecr{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);}
.ecr:hover{background:var(--bg3);}
.ecr input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.ecl{font-size:12px;color:var(--text2);flex:1;}
.ecm{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.note{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin:4px 0 10px;line-height:1.5;}
.br{display:flex;gap:8px;flex-wrap:wrap;}
.ba{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:7px 14px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);}
.ba:active{background:var(--bg3);}
.ba.primary{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:500;}
.ba.danger{color:var(--danger);border-color:rgba(255,90,90,.35);}
.ba.ghost{color:var(--text3);}
.expbtn{display:block;width:100%;padding:12px 14px;font-size:13px;font-family:'IBM Plex Mono',monospace;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);text-align:left;margin-bottom:8px;}
.expbtn:active{background:var(--bg3);}
.expnote{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:14px;line-height:1.6;}
.bbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;max-width:480px;margin:0 auto;}
.bm{flex:1;padding:11px;font-size:13px;font-family:'IBM Plex Mono',monospace;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);}
.bm:active{background:var(--bg3);}
.bm.primary{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:500;}
.bm.primary:active{background:var(--accent2);}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-size:12px;font-family:'IBM Plex Mono',monospace;padding:8px 16px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:100;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.lh{font-size:10px;color:var(--text3);}
</style>
</head>
<body>
<header>
  <div class="logo">GYM_TRACKER</div>
  <div class="sw"><div class="dot" id="sdot"></div><span class="stxt" id="stxt">—</span></div>
</header>
<div class="nav">
  <button class="nb active" onclick="showPage('workout')">тренировка</button>
  <button class="nb" onclick="showPage('settings')">настройки</button>
  <button class="nb" onclick="showPage('export')">экспорт</button>
</div>
<div id="pg-workout" class="page active"></div>
<div id="pg-settings" class="page"></div>
<div id="pg-export" class="page"></div>
<div class="bbar" id="bbar">
  <button class="bm" onclick="clearDay()">Очистить</button>
  <button class="bm primary" onclick="saveDay()">Сохранить тренировку</button>
</div>
<div class="toast" id="toast"></div>

<script>
const GS="https://script.google.com/macros/s/AKfycbzBrKu5a8Ipuuix4UAi6zau51NCR0QgMTcKhKwKUhl-Ww382UtQ3WTwGmDr7m-AKGRa7g/exec";

// defaultUnit: "кг" | "ф" — дефолтная единица, переключается кнопкой
// hasBar: базовый вес снаряда из настроек
// bodyweight: база = вес тела, показывает ±adj
// timeOnly: секунды, вес не нужен (планка без bodyweight использует только время)
const BIEX=[
  {id:"hyper",      name:"Гиперэкстензия",       defaultUnit:"кг"},
  {id:"chest_press",name:"Жим грудь",             defaultUnit:"кг", hasBar:true},
  {id:"db_press",   name:"Жим гантелей",          defaultUnit:"кг"},
  {id:"butterfly",  name:"Бабочка",               defaultUnit:"кг"},
  {id:"front_raise",name:"Перед собой блин",      defaultUnit:"кг"},
  {id:"bicep_ez",   name:"Подъём на бицепс EZ",  defaultUnit:"кг", hasBar:true},
  {id:"ohp",        name:"Жим стоя/сидя",         defaultUnit:"кг", hasBar:true},
  {id:"laterals",   name:"Махи + перед собой",    defaultUnit:"кг"},
  {id:"lunges",     name:"Выпады",                defaultUnit:"кг"},
  {id:"hack",       name:"Гак-присед",            defaultUnit:"кг"},
  {id:"leg_ext",    name:"Разгибание ног",        defaultUnit:"кг"},
  {id:"pullups",    name:"Подтягивания",          defaultUnit:"кг", bodyweight:true},
  {id:"tbar",       name:"Тяга Т-грифа",          defaultUnit:"кг", hasBar:true},
  {id:"horiz_row",  name:"Горизонтальная тяга",   defaultUnit:"ф"},
  {id:"tri_db",     name:"Трицепс гантель сидя",  defaultUnit:"кг"},
  {id:"tri_rope",   name:"Трицепс канат",         defaultUnit:"ф"},
  {id:"plank",      name:"Планка на локтях",      defaultUnit:"сек", bodyweight:true},
];

const BIPR=[
  {id:"mon", name:"ПН · Грудь/Бицепс",  exIds:["hyper","chest_press","db_press","butterfly","front_raise","bicep_ez"], builtin:true},
  {id:"thu", name:"ЧТ · Ноги/Плечи",    exIds:["hyper","ohp","laterals","lunges","hack","leg_ext"], builtin:true},
  {id:"sat", name:"СБ · Спина/Трицепс", exIds:["hyper","pullups","tbar","horiz_row","tri_db","tri_rope","plank"], builtin:true},
];

// ── state ─────────────────────────────────────────────────────────────────────
let D={};
try{D=JSON.parse(localStorage.getItem("gym_v9")||"{}");}catch(e){}
if(!D.settings)    D.settings={bodyWeight:80,barWeights:{chest_press:20,ohp:20,bicep_ez:7,tbar:15}};
if(!D.cPresets)    D.cPresets=[];   // overrides for builtin + custom presets
if(!D.cExercises)  D.cExercises=[]; // custom exercises only
if(!D.exOverrides) D.exOverrides={}; // overrides for builtin exercise names/flags
if(!D.prExIds)     D.prExIds={};   // exId overrides for builtin presets
if(!D.workouts)    D.workouts={};
if(!D.history)     D.history={};
if(!D.unitPref)    D.unitPref={};

let curPage="workout", curPreset="mon";
let editPreset=null, editEx=null, showNewExForm=false;
let histOpen={}, histExp={};

// ── persistence ───────────────────────────────────────────────────────────────
function sl(){try{localStorage.setItem("gym_v9",JSON.stringify(D));}catch(e){}}
function ssync(s,t){document.getElementById("sdot").className="dot "+s;document.getElementById("stxt").textContent=t;}
async function gsGet(key){
  try{ssync("busy","загрузка...");const r=await fetch(GS+"?action=get&key="+encodeURIComponent(key));const j=await r.json();ssync("ok","синхр.");return j.value?JSON.parse(j.value):null;}
  catch(e){ssync("err","нет связи");return null;}
}
async function gsSet(key,val){
  try{ssync("busy","сохр...");const r=await fetch(GS+"?action=set&key="+encodeURIComponent(key)+"&value="+encodeURIComponent(JSON.stringify(val)));const j=await r.json();if(j.ok)ssync("ok","сохранено");else ssync("err","ошибка");}
  catch(e){ssync("err","нет связи");}
}

// ── helpers ───────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function kgToLbs(kg){return+(kg*2.20462).toFixed(1);}
function lbsToKg(lbs){return+(lbs/2.20462).toFixed(2);}

// all exercises: builtin (with overrides applied) + custom
function allEx(){
  const bi=BIEX.map(e=>{
    const ov=D.exOverrides[e.id]||{};
    return{...e,...ov};
  });
  return[...bi,...D.cExercises];
}

// all presets: builtin (with exIds overrides) + custom
function allPr(){
  const bi=BIPR.map(p=>{
    const exIds=D.prExIds[p.id]||p.exIds;
    const nameOv=D.prExIds[p.id+"_name"];
    return{...p,exIds,name:nameOv||p.name};
  });
  return[...bi,...D.cPresets];
}

function getEx(id){return allEx().find(e=>e.id===id);}
function getPr(id){return allPr().find(p=>p.id===id);}

// effective unit for display: user may have toggled кг↔ф
function dispUnit(exId){
  const ex=getEx(exId);if(!ex)return"кг";
  const def=ex.defaultUnit||"кг";
  const pref=D.unitPref[exId];
  if(!pref)return def;
  // pref "lbs" → show фунты, pref "kg" → show кг
  if(pref==="lbs")return"ф";
  if(pref==="kg")return"кг";
  return def;
}
function isLbs(exId){return dispUnit(exId)==="ф";}

function getW(pid){if(!D.workouts[pid])D.workouts[pid]={date:today(),sets:{}};return D.workouts[pid];}
function getSets(pid,exId){const w=getW(pid);if(!w.sets[exId])w.sets[exId]=[{weight:"",reps:"",adj:""}];return w.sets[exId];}

function baseW(exId){
  const ex=getEx(exId);if(!ex)return 0;
  if(ex.bodyweight)return parseFloat(D.settings.bodyWeight)||0;
  if(ex.hasBar)return parseFloat((D.settings.barWeights||{})[exId])||0;
  return 0;
}

function effW(exId,s){
  const ex=getEx(exId);if(!ex)return 0;
  const base=baseW(exId);
  if(ex.bodyweight)return base+(parseFloat(s.adj)||0);
  return base+(parseFloat(s.weight)||0);
}

function calcVol(exId,sets){
  const ex=getEx(exId);if(!ex||!sets||!sets.length)return 0;
  const du=ex.defaultUnit||"кг";
  if(du==="сек"){
    return sets.reduce((a,x)=>{
      const bSnap=parseFloat(x.baseSnap)||baseW(exId);
      return a+(bSnap+(parseFloat(x.adj)||0))*(parseFloat(x.reps)||0);
    },0);
  }
  if(du==="повт")return sets.reduce((a,x)=>a+(parseFloat(x.reps)||0),0);
  // кг or ф: volume always in kg
  return sets.reduce((a,x)=>a+effW(exId,x)*(parseFloat(x.reps)||0),0);
}

function fmtVol(v,du){
  if(du==="сек")return Math.round(v)+" кг·с";
  if(du==="повт")return Math.round(v)+" повт";
  return Math.round(v)+" кг·повт";
}

function getHist(exId){return D.history[exId]||[];}

function calcPR(exId){
  const ex=getEx(exId);const h=getHist(exId);if(!ex||!h.length)return null;
  const du=ex.defaultUnit||"кг";
  if(du==="сек"||du==="повт"){const m=Math.max(...h.flatMap(e=>e.sets.map(s=>parseFloat(s.reps)||0)));return m>0?m+" "+du:null;}
  const m=Math.max(...h.flatMap(e=>e.sets.map(s=>{
    const base=parseFloat(s.baseSnap)||baseW(exId);
    return ex.bodyweight?base+(parseFloat(s.adj)||0):base+(parseFloat(s.weight)||0);
  })));
  return m>0?m+" кг":null;
}

function fmtSetHist(exId,s){
  const ex=getEx(exId);if(!ex)return"—";
  const du=ex.defaultUnit||"кг";
  const r=parseFloat(s.reps);if(isNaN(r))return"пропущено";
  const adj=parseFloat(s.adj)||0;
  if(du==="сек"){const bSnap=parseFloat(s.baseSnap)||baseW(exId);return(adj!==0?(adj>0?"+"+adj:String(adj))+"кг ":"")+r+"с";}
  if(du==="повт")return(adj!==0?(adj>0?"+"+adj:String(adj))+"кг ":"")+r+"п";
  const base=parseFloat(s.baseSnap)||baseW(exId);
  const total=ex.bodyweight?base+adj:base+(parseFloat(s.weight)||0);
  // always show in кг in history for clarity
  return total+"кг×"+r;
}

// ── set row HTML ──────────────────────────────────────────────────────────────
function setRowHTML(pid,exId,i,s){
  const ex=getEx(exId);if(!ex)return"";
  const du=ex.defaultUnit||"кг";
  const bw=!!ex.bodyweight;
  const lbs=isLbs(exId); // user toggled display unit

  if(bw){
    const rph=du==="сек"?"сек":"повт";
    return`<div class="sr">
      <div class="sn">${i+1}</div>
      <input class="si sm" type="number" step="0.5" placeholder="±кг" value="${s.adj||""}" oninput="updAdj('${pid}','${exId}',${i},this.value)">
      <input class="si" type="number" min="0" step="1" placeholder="${rph}" value="${s.reps||""}" oninput="updReps('${pid}','${exId}',${i},this.value)">
      <button class="ds" onclick="delSet('${pid}','${exId}',${i})">×</button>
    </div>`;
  }

  if(du==="повт"){
    return`<div class="sr">
      <div class="sn">${i+1}</div>
      <div></div>
      <input class="si" type="number" min="0" step="1" placeholder="повт" value="${s.reps||""}" oninput="updReps('${pid}','${exId}',${i},this.value)">
      <button class="ds" onclick="delSet('${pid}','${exId}',${i})">×</button>
    </div>`;
  }

  if(du==="сек"){
    return`<div class="sr">
      <div class="sn">${i+1}</div>
      <div></div>
      <input class="si" type="number" min="0" step="1" placeholder="сек" value="${s.reps||""}" oninput="updReps('${pid}','${exId}',${i},this.value)">
      <button class="ds" onclick="delSet('${pid}','${exId}',${i})">×</button>
    </div>`;
  }

  // кг or ф — user can toggle between them
  const ph=lbs?"фунты":"кг";
  const raw=parseFloat(s.weight);
  const dispW=lbs&&!isNaN(raw)?kgToLbs(raw):(s.weight||"");

  return`<div class="sr">
    <div class="sn">${i+1}</div>
    <input class="si" type="number" min="0" step="0.5" placeholder="${ph}" value="${dispW}" oninput="updW('${pid}','${exId}',${i},this.value,${lbs})">
    <input class="si" type="number" min="0" step="1" placeholder="повт" value="${s.reps||""}" oninput="updReps('${pid}','${exId}',${i},this.value)">
    <button class="ds" onclick="delSet('${pid}','${exId}',${i})">×</button>
  </div>`;
}

// ── volume block ──────────────────────────────────────────────────────────────
function buildVol(exId,sets){
  const ex=getEx(exId);if(!ex)return`<div id="vol-${exId}"></div>`;
  const du=ex.defaultUnit||"кг";
  const cur=calcVol(exId,sets);
  if(cur<=0)return`<div id="vol-${exId}"></div>`;
  const hist=getHist(exId);
  const prev=hist.length?calcVol(exId,hist[hist.length-1].sets):null;
  const maxV=hist.length?Math.max(...hist.map(h=>calcVol(exId,h.sets))):0;
  const dl=[];
  if(prev!==null&&prev>0){const d=cur-prev,p=Math.round(Math.abs(d)/prev*100);if(d>0)dl.push(`<span class="vd up">▲ +${p}% к прош.</span>`);else if(d<0)dl.push(`<span class="vd dn">▼ −${p}% к прош.</span>`);else dl.push(`<span class="vd eq">= прош.</span>`);}
  if(maxV>0){const d2=cur-maxV;if(d2>0)dl.push(`<span class="vd up">▲ новый макс!</span>`);else{const p2=Math.round(Math.abs(d2)/maxV*100);dl.push(`<span class="vd eq">−${p2}% к макс.</span>`);}}
  return`<div id="vol-${exId}" class="vbl"><div class="vr"><span class="vlbl">объём:</span><span class="vval">${fmtVol(cur,du)}</span>${dl.join(" ")}</div></div>`;
}

// ── history block ─────────────────────────────────────────────────────────────
function buildHist(exId){
  const ex=getEx(exId);if(!ex)return"";
  const du=ex.defaultUnit||"кг";
  const hist=getHist(exId);
  const open=histOpen[exId];
  const exp=histExp[exId];
  const shown=exp?hist:hist.slice(-3);
  const hasMore=hist.length>3;
  let entries=hist.length===0?`<div class="sk">пока пусто</div>`
    :shown.slice().reverse().map(h=>{
        const vol=calcVol(exId,h.sets);
        const sStr=h.sets.map((s,i)=>{const f=fmtSetHist(exId,s);return`<span${f==="пропущено"?' class="sk"':''}>${i+1}: ${f}</span>`;}).join("  ");
        return`<div class="he"><div class="htop"><span class="hd">${h.date}</span><div class="hm"><span class="hv">${fmtVol(vol,du)}</span><button class="dh" onclick="delHist('${exId}','${h.date}')">×</button></div></div><div class="hs">${sStr}</div></div>`;
      }).join("")+(hasMore&&!exp?`<button class="mb" onclick="histExp['${exId}']=true;renderWorkout()">показать все (${hist.length})</button>`:"");
  return`<div class="hbl">
    <button class="htog" onclick="histOpen['${exId}']=!histOpen['${exId}'];renderWorkout()">
      <span class="harr${open?" open":""}">▶</span>
      <span>история${hist.length?` (${hist.length})`:""}</span>
    </button>
    <div class="hlist${open?" open":""}">${entries}</div>
  </div>`;
}

// ── render workout ────────────────────────────────────────────────────────────
function renderWorkout(){
  const pr=getPr(curPreset);
  if(!pr){document.getElementById("pg-workout").innerHTML=`<div style="color:var(--text3);font-size:13px;padding:20px 0">Пресет не найден</div>`;return;}
  const w=getW(curPreset);
  const chips=allPr().map(p=>`<button class="chip${p.id===curPreset?" on":""}" onclick="switchPreset('${p.id}')">${p.name}</button>`).join("")
    +`<button class="chip dim" onclick="goNewPreset()">+ новый</button>`;
  let html=`<div class="chips">${chips}</div>
  <div class="drow"><span class="dlbl">дата:</span><input type="date" class="dinp" value="${w.date||today()}" onchange="getW('${curPreset}').date=this.value;sl()"></div>`;

  pr.exIds.forEach(exId=>{
    const ex=getEx(exId);if(!ex)return;
    const sets=getSets(curPreset,exId);
    const pr2=calcPR(exId);
    const bw=!!ex.bodyweight;
    const du=ex.defaultUnit||"кг";
    const lbs=isLbs(exId);
    const base=baseW(exId);
    const showUnitBtn=du!=="сек"&&du!=="повт"&&!bw;

    // column headers depend on actual display unit
    let h1="",h2="";
    if(bw){h1="±кг";h2=du==="сек"?"сек":"повт";}
    else if(du==="повт"){h1="";h2="повт";}
    else if(du==="сек"){h1="";h2="сек";}
    else{h1=lbs?"фунты":"кг";h2="повт";}

    const unitBtn=showUnitBtn?`<button class="bxs${lbs?" on":""}" onclick="toggleUnit('${exId}')">${lbs?"ф→кг":"кг→ф"}</button>`:"";
    let binfo="";
    if(base>0) binfo=`<div class="binfo">${bw?`вес тела: ${base} кг · ±отягощение/резинка`:`гриф/база: ${base} кг`}</div>`;

    html+=`<div class="card">
      <div class="ch"><div class="cn">${ex.name}</div><div class="ca">${pr2?`<span class="badge">PR ${pr2}</span>`:""}${unitBtn}<button class="bxs" onclick="addSet('${curPreset}','${exId}')">+ подход</button></div></div>
      ${binfo}
      <div class="sh"><span>#</span><span>${h1}</span><span>${h2}</span><span></span></div>
      <div id="sets-${exId}">${sets.map((s,i)=>setRowHTML(curPreset,exId,i,s)).join("")}</div>
      ${buildVol(exId,sets)}
      ${buildHist(exId)}
    </div>`;
  });
  document.getElementById("pg-workout").innerHTML=html;
}

// ── render settings ───────────────────────────────────────────────────────────
function renderSettings(){
  const s=D.settings;
  let html=`<div class="ss">
    <div class="st">Мой вес</div>
    <div class="srow"><div><div class="slbl">Вес тела</div><div class="ssub">база для подтягиваний и планки</div></div>
    <input class="sinp" type="number" step="0.5" value="${s.bodyWeight||80}" placeholder="кг" onchange="D.settings.bodyWeight=parseFloat(this.value)||80;sl();showToast('сохранено')"></div>
  </div>`;

  // bar weights — all exercises with hasBar
  const barExes=allEx().filter(e=>e.hasBar);
  if(barExes.length){
    html+=`<div class="ss"><div class="st">Базовый вес снарядов</div>`;
    barExes.forEach(ex=>{
      const val=(s.barWeights||{})[ex.id]||"";
      html+=`<div class="srow"><div class="slbl">${ex.name}</div>
        <input class="sinp" type="number" step="0.5" value="${val}" placeholder="кг"
          onchange="if(!D.settings.barWeights)D.settings.barWeights={};D.settings.barWeights['${ex.id}']=parseFloat(this.value)||0;sl();showToast('сохранено')">
      </div>`;
    });
    html+=`</div>`;
  }

  // ALL presets (builtin + custom)
  html+=`<div class="ss"><div class="st">Мои пресеты</div>`;
  allPr().forEach((pr)=>{
    const isBI=!!pr.builtin;
    if(editPreset===pr.id){
      const exList=allEx().map(ex=>{
        const on=pr.exIds.includes(ex.id);
        const du=ex.defaultUnit||"кг";
        const meta=[du,ex.bodyweight?"тело":ex.hasBar?"гриф":""].filter(Boolean).join(" · ");
        return`<label class="ecr"><input type="checkbox" ${on?"checked":""} onchange="toggleExInPr('${pr.id}',${isBI},'${ex.id}',this.checked)"><span class="ecl">${ex.name}</span><span class="ecm">${meta}</span></label>`;
      }).join("");
      const newForm=showNewExForm?`<div style="background:var(--bg3);border-radius:var(--rs);padding:10px;margin-top:8px;">
        <input class="einp" id="nex-name" placeholder="Название упражнения" style="margin-bottom:6px;">
        <select class="esel" id="nex-unit"><option value="кг">кг</option><option value="ф">фунты (ф)</option><option value="повт">только повторения</option><option value="сек">секунды</option></select>
        <div class="flags"><label><input type="checkbox" id="nex-bar"> Есть гриф/база</label><label><input type="checkbox" id="nex-bw"> Вес тела (±adj)</label></div>
        <div class="br"><button class="ba primary" onclick="createEx('${pr.id}')">Создать</button><button class="ba" onclick="showNewExForm=false;renderSettings()">Отмена</button></div>
      </div>`:`<button class="ba ghost" style="margin-top:8px;" onclick="showNewExForm=true;renderSettings()">+ создать новое упражнение</button>`;
      html+=`<div class="editor">
        <input class="einp" value="${pr.name}" placeholder="Название" oninput="savePrName('${pr.id}',${isBI},this.value)">
        <div style="max-height:320px;overflow-y:auto;">${exList}</div>
        ${newForm}
        <div class="br" style="margin-top:10px;">
          <button class="ba primary" onclick="editPreset=null;showNewExForm=false;renderSettings()">Готово</button>
          ${!isBI?`<button class="ba danger" onclick="deletePr('${pr.id}')">Удалить пресет</button>`:""}
        </div>
      </div>`;
    } else {
      html+=`<div class="srow"><div><div class="slbl">${pr.name}</div><div class="ssub">${pr.exIds.length} упражнений${isBI?" · встроенный":""}</div></div>
        <button class="ba" onclick="editPreset='${pr.id}';showNewExForm=false;renderSettings()">изменить</button></div>`;
    }
  });
  html+=`<button class="ba" style="margin-top:12px;" onclick="createPr()">+ создать пресет</button></div>`;

  // ALL exercises (builtin + custom)
  html+=`<div class="ss"><div class="st">Все упражнения</div>`;
  allEx().forEach((ex)=>{
    const isBI=!!BIEX.find(e=>e.id===ex.id);
    if(editEx===ex.id){
      const du=ex.defaultUnit||"кг";
      html+=`<div class="editor">
        <input class="einp" id="eex-name" value="${ex.name}" placeholder="Название">
        <select class="esel" id="eex-unit">
          <option value="кг"${du==="кг"?" selected":""}>кг</option>
          <option value="ф"${du==="ф"?" selected":""}>фунты (ф)</option>
          <option value="повт"${du==="повт"?" selected":""}>только повторения</option>
          <option value="сек"${du==="сек"?" selected":""}>секунды</option>
        </select>
        <div class="flags">
          <label><input type="checkbox" id="eex-bar" ${ex.hasBar?"checked":""}> Есть гриф/база</label>
          <label><input type="checkbox" id="eex-bw" ${ex.bodyweight?"checked":""}> Вес тела (±adj)</label>
        </div>
        <div class="note">история сохраняется при любых изменениях${isBI?" · это встроенное упражнение, удалить нельзя":""}</div>
        <div class="br">
          <button class="ba primary" onclick="saveEx('${ex.id}',${isBI})">Сохранить</button>
          <button class="ba" onclick="editEx=null;renderSettings()">Отмена</button>
          ${!isBI?`<button class="ba danger" onclick="deleteEx('${ex.id}')">Удалить</button>`:""}
        </div>
      </div>`;
    } else {
      const du=ex.defaultUnit||"кг";
      const meta=[du,ex.bodyweight?"тело":ex.hasBar?"гриф":""].filter(Boolean).join(" · ");
      const hLen=(D.history[ex.id]||[]).length;
      html+=`<div class="srow">
        <div><div class="slbl">${ex.name}</div><div class="ssub">${meta}${hLen?` · ${hLen} зап.`:""}${isBI?" · встроенное":""}</div></div>
        <button class="ba" onclick="editEx='${ex.id}';renderSettings()">изменить</button>
      </div>`;
    }
  });
  html+=`</div>`;

  document.getElementById("pg-settings").innerHTML=html;
}

// ── render export ─────────────────────────────────────────────────────────────
function renderExport(){
  document.getElementById("pg-export").innerHTML=`
    <div class="expnote">CSV открывается в Excel и Google Sheets. BOM включён — кириллица корректна.</div>
    <button class="expbtn" onclick="exportAll()">📥 Скачать всю историю</button>
    ${allEx().map(ex=>`<button class="expbtn" onclick="exportEx('${ex.id}')">${ex.name}</button>`).join("")}`;
}

function exportAll(){
  let rows=["дата,упражнение,подход,вес(кг),повт/сек,объём"];
  allEx().forEach(ex=>{
    getHist(ex.id).forEach(h=>{
      h.sets.forEach((s,i)=>{
        const base=parseFloat(s.baseSnap)||baseW(ex.id);
        const adj=parseFloat(s.adj)||0;const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;
        const total=ex.bodyweight?base+adj:base+w;
        const vol=calcVol(ex.id,[{...s,baseSnap:base}]);
        rows.push([h.date,`"${ex.name}"`,i+1,total,r,Math.round(vol)].join(","));
      });
    });
  });
  dlCSV(rows.join("\n"),"gym_history.csv");
}

function exportEx(exId){
  const ex=getEx(exId);if(!ex)return;
  let rows=["дата,подход,вес(кг),повт/сек,объём"];
  getHist(exId).forEach(h=>{
    h.sets.forEach((s,i)=>{
      const base=parseFloat(s.baseSnap)||baseW(exId);
      const adj=parseFloat(s.adj)||0;const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;
      const total=ex.bodyweight?base+adj:base+w;
      const vol=calcVol(exId,[{...s,baseSnap:base}]);
      rows.push([h.date,i+1,total,r,Math.round(vol)].join(","));
    });
  });
  dlCSV(rows.join("\n"),ex.name.replace(/\s+/g,"_")+".csv");
}

function dlCSV(c,f){
  const b=new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8;"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");
  a.href=u;a.download=f;a.click();URL.revokeObjectURL(u);
}

// ── interactions ──────────────────────────────────────────────────────────────
function switchPreset(id){curPreset=id;renderWorkout();}
function goNewPreset(){showPage("settings");createPr();}

function savePrName(id,isBI,name){
  if(isBI){if(!D.prExIds[id+"_name"]||true)D.prExIds[id+"_name"]=name;sl();}
  else{const pr=D.cPresets.find(p=>p.id===id);if(pr){pr.name=name;sl();}}
}

function toggleExInPr(pid,isBI,exId,on){
  if(isBI){
    const orig=BIPR.find(p=>p.id===pid);
    const cur=D.prExIds[pid]?[...D.prExIds[pid]]:[...(orig?.exIds||[])];
    if(on&&!cur.includes(exId))cur.push(exId);
    if(!on){const i=cur.indexOf(exId);if(i>=0)cur.splice(i,1);}
    D.prExIds[pid]=cur;sl();
  } else {
    const pr=D.cPresets.find(p=>p.id===pid);if(!pr)return;
    if(on&&!pr.exIds.includes(exId))pr.exIds.push(exId);
    if(!on)pr.exIds=pr.exIds.filter(e=>e!==exId);
    sl();
  }
}

function createPr(){
  const id="cp_"+Date.now();
  D.cPresets.push({id,name:"Новый пресет",exIds:[]});
  sl();editPreset=id;showNewExForm=false;renderSettings();
}
function deletePr(id){
  D.cPresets=D.cPresets.filter(p=>p.id!==id);
  if(curPreset===id)curPreset="mon";
  editPreset=null;sl();renderSettings();showToast("пресет удалён");
}

function createEx(pid){
  const name=(document.getElementById("nex-name")?.value||"").trim();
  if(!name){showToast("введи название");return;}
  const defaultUnit=document.getElementById("nex-unit")?.value||"кг";
  const hasBar=document.getElementById("nex-bar")?.checked||false;
  const bodyweight=document.getElementById("nex-bw")?.checked||false;
  const id="ex_"+Date.now();
  D.cExercises.push({id,name,defaultUnit,hasBar,bodyweight});
  // add to preset
  const isBI=!!BIPR.find(p=>p.id===pid);
  toggleExInPr(pid,isBI,id,true);
  showNewExForm=false;sl();renderSettings();showToast("упражнение создано");
}

function saveEx(exId,isBI){
  const name=(document.getElementById("eex-name")?.value||"").trim();
  if(!name){showToast("введи название");return;}
  const defaultUnit=document.getElementById("eex-unit")?.value||"кг";
  const hasBar=document.getElementById("eex-bar")?.checked||false;
  const bodyweight=document.getElementById("eex-bw")?.checked||false;
  if(isBI){
    // store override
    D.exOverrides[exId]={name,defaultUnit,hasBar,bodyweight};
  } else {
    const idx=D.cExercises.findIndex(e=>e.id===exId);
    if(idx>=0)D.cExercises[idx]={...D.cExercises[idx],name,defaultUnit,hasBar,bodyweight};
  }
  editEx=null;sl();renderSettings();showToast("сохранено");
}

function deleteEx(exId){
  D.cPresets.forEach(pr=>{pr.exIds=pr.exIds.filter(id=>id!==exId);});
  // also remove from builtin preset overrides
  Object.keys(D.prExIds).forEach(pid=>{
    if(Array.isArray(D.prExIds[pid]))D.prExIds[pid]=D.prExIds[pid].filter(id=>id!==exId);
  });
  D.cExercises=D.cExercises.filter(e=>e.id!==exId);
  editEx=null;sl();renderSettings();showToast("удалено, история сохранена");
}

function toggleUnit(exId){
  const cur=dispUnit(exId);
  D.unitPref[exId]=cur==="ф"?"kg":"lbs";
  sl();renderWorkout();
}

function updReps(pid,exId,i,v){const s=getSets(pid,exId);if(!s[i])s[i]={};s[i].reps=v;sl();refreshVol(exId);}
function updAdj(pid,exId,i,v){const s=getSets(pid,exId);if(!s[i])s[i]={};s[i].adj=v;sl();refreshVol(exId);}
function updW(pid,exId,i,v,fromLbs){const s=getSets(pid,exId);if(!s[i])s[i]={};s[i].weight=fromLbs?lbsToKg(parseFloat(v)||0):v;sl();refreshVol(exId);}

function refreshVol(exId){
  const el=document.getElementById("vol-"+exId);if(!el)return;
  el.outerHTML=buildVol(exId,getSets(curPreset,exId));
}
function addSet(pid,exId){
  const s=getSets(pid,exId);s.push({weight:"",reps:"",adj:""});sl();
  const c=document.getElementById("sets-"+exId);
  if(c)c.insertAdjacentHTML("beforeend",setRowHTML(pid,exId,s.length-1,s[s.length-1]));
}
function delSet(pid,exId,i){
  const s=getSets(pid,exId);if(s.length<=1)return;
  s.splice(i,1);sl();renderWorkout();
}
async function delHist(exId,date){
  if(!D.history[exId])return;
  D.history[exId]=D.history[exId].filter(h=>h.date!==date);
  sl();await gsSet("hist2_"+exId,D.history[exId]);showToast("запись удалена");renderWorkout();
}

async function saveDay(){
  const pr=getPr(curPreset);if(!pr)return;
  const w=getW(curPreset);const date=w.date||today();
  pr.exIds.forEach(exId=>{
    const ex=getEx(exId);if(!ex)return;
    if(!D.history[exId])D.history[exId]=[];
    const hist=D.history[exId];
    const snap=getSets(curPreset,exId).map(s=>({...s,baseSnap:baseW(exId)}));
    const entry={date,sets:JSON.parse(JSON.stringify(snap))};
    const idx=hist.findIndex(h=>h.date===date);
    if(idx>=0)hist[idx]=entry;else hist.push(entry);
    if(hist.length>20)hist.splice(0,hist.length-20);
  });
  sl();
  for(const exId of pr.exIds)await gsSet("hist2_"+exId,D.history[exId]);
  await gsSet("workout_"+curPreset,w);
  await gsSet("settings",D.settings);
  await gsSet("cPresets",D.cPresets);
  await gsSet("cExercises",D.cExercises);
  await gsSet("exOverrides",D.exOverrides);
  await gsSet("prExIds",D.prExIds);
  showToast("сохранено ✓");renderWorkout();
}

function clearDay(){
  const pr=getPr(curPreset);if(!pr)return;
  getW(curPreset).sets={};sl();renderWorkout();
}

function showPage(name){
  curPage=name;
  if(name!=="settings"){editPreset=null;editEx=null;showNewExForm=false;}
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nb").forEach((b,i)=>b.classList.toggle("active",["workout","settings","export"][i]===name));
  document.getElementById("pg-"+name).classList.add("active");
  document.getElementById("bbar").style.display=name==="workout"?"flex":"none";
  if(name==="settings")renderSettings();
  if(name==="export")renderExport();
  if(name==="workout")renderWorkout();
}

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;
  t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);
}

async function loadCloud(){
  const settings=await gsGet("settings");if(settings)D.settings=settings;
  const cp=await gsGet("cPresets");if(cp)D.cPresets=cp;
  const ce=await gsGet("cExercises");if(ce)D.cExercises=ce;
  const eo=await gsGet("exOverrides");if(eo)D.exOverrides=eo;
  const pi=await gsGet("prExIds");if(pi)D.prExIds=pi;
  for(const ex of allEx()){const h=await gsGet("hist2_"+ex.id);if(h)D.history[ex.id]=h;}
  for(const pr of allPr()){const ww=await gsGet("workout_"+pr.id);if(ww)D.workouts[pr.id]=ww;}
  sl();renderWorkout();renderSettings();renderExport();
}

renderWorkout();renderSettings();renderExport();
ssync("busy","загрузка...");
loadCloud();
</script>
