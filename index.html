<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gym Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #222;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --text: #e8e8e8;
  --text2: #888;
  --text3: #555;
  --accent: #c8f060;
  --accent2: #a0d040;
  --danger: #ff5a5a;
  --success: #4caf7d;
  --r: 10px;
  --rs: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; }
body { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

header {
  padding: 18px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.logo { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 500; color: var(--accent); }
.sync-wrap { display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.sync-dot.ok { background: var(--success); }
.sync-dot.busy { background: var(--accent); animation: blink 1s infinite; }
.sync-dot.err { background: var(--danger); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.sync-txt { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }

.tabs {
  display: flex;
  padding: 12px 16px 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 8px 14px 10px;
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.panel { display: none; padding: 16px; }
.panel.active { display: block; }

.date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.date-lbl { font-size: 12px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; }
.date-inp {
  font-size: 12px; font-family: 'IBM Plex Mono', monospace;
  padding: 5px 8px; border: 1px solid var(--border2);
  border-radius: var(--rs); background: var(--bg2); color: var(--text);
}

.ex-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px;
  margin-bottom: 10px;
}
.ex-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
.ex-name { font-size: 13px; font-weight: 500; }
.ex-ref { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
.ex-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.pr-badge {
  font-size: 10px; font-family: 'IBM Plex Mono', monospace;
  padding: 2px 7px; border-radius: 20px;
  background: rgba(200,240,96,.1); color: var(--accent);
  border: 1px solid rgba(200,240,96,.2); white-space: nowrap;
}
.btn-add-set {
  font-size: 11px; font-family: 'IBM Plex Mono', monospace;
  padding: 3px 10px; border-radius: var(--rs);
  cursor: pointer; border: 1px solid var(--border2);
  background: transparent; color: var(--text2); white-space: nowrap;
}
.btn-add-set:active { background: var(--bg3); }

.sets-head { display: grid; grid-template-columns: 28px 1fr 1fr 24px; gap: 4px; margin-bottom: 4px; }
.sets-head span { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; text-align: center; }
.set-row { display: grid; grid-template-columns: 28px 1fr 1fr 24px; gap: 4px; margin-bottom: 4px; align-items: center; }
.set-num { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; text-align: center; }
.set-inp {
  width: 100%; font-size: 14px; font-family: 'IBM Plex Mono', monospace;
  padding: 6px 4px; border: 1px solid var(--border);
  border-radius: var(--rs); background: var(--bg3); color: var(--text);
  text-align: center; -webkit-appearance: none;
}
.set-inp:focus { outline: none; border-color: var(--border2); }
.btn-del-set { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 16px; line-height: 1; text-align: center; padding: 0; }
.btn-del-set:active { color: var(--danger); }

.hist-block { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
.hist-lbl { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-bottom: 6px; }
.hist-row {
  display: flex; justify-content: space-between; align-items: center;
  gap: 8px; margin-bottom: 4px;
}
.hist-txt { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--text2); line-height: 1.5; }
.hist-date { color: var(--text3); }
.btn-del-hist { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
.btn-del-hist:active { color: var(--danger); }
.hist-empty { font-size: 11px; color: var(--text3); font-style: italic; }

.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--border);
  padding: 10px 16px; display: flex; gap: 8px;
  max-width: 480px; margin: 0 auto;
}
.btn-main {
  flex: 1; padding: 11px; font-size: 13px;
  font-family: 'IBM Plex Mono', monospace;
  border-radius: var(--r); cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent; color: var(--text2);
}
.btn-main:active { background: var(--bg3); }
.btn-main.primary { background: var(--accent); color: #0f0f0f; border-color: transparent; font-weight: 500; }
.btn-main.primary:active { background: var(--accent2); }

.toast {
  position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--text); font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  padding: 8px 16px; border-radius: 20px;
  opacity: 0; transition: opacity .2s, transform .2s;
  pointer-events: none; white-space: nowrap; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">GYM_TRACKER</div>
  <div class="sync-wrap">
    <div class="sync-dot" id="sdot"></div>
    <span class="sync-txt" id="stxt">—</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchDay('mon')">ПН · Грудь/Бицепс</button>
  <button class="tab" onclick="switchDay('thu')">ЧТ · Ноги/Плечи</button>
  <button class="tab" onclick="switchDay('sat')">СБ · Спина/Трицепс</button>
</div>

<div id="panel-mon" class="panel active"></div>
<div id="panel-thu" class="panel"></div>
<div id="panel-sat" class="panel"></div>

<div class="bottom-bar">
  <button class="btn-main" onclick="clearDay()">Очистить</button>
  <button class="btn-main primary" onclick="saveDay()">Сохранить тренировку</button>
</div>

<div class="toast" id="toast"></div>

<script>
const GS = "https://script.google.com/macros/s/AKfycbzBrKu5a8Ipuuix4UAi6zau51NCR0QgMTcKhKwKUhl-Ww382UtQ3WTwGmDr7m-AKGRa7g/exec";

const DAYS = {
  mon: { exercises: [
    { id:"hyper_mon", name:"Гиперэкстензия", unit:"кг", ref:"" },
    { id:"chest_press", name:"Жим грудь", unit:"кг", ref:"ориент: 5 кг" },
    { id:"db_press", name:"Жим гантелей", unit:"кг", ref:"ориент: 12–14 кг" },
    { id:"butterfly", name:"Бабочка", unit:"кг", ref:"ориент: 25–30 кг" },
    { id:"front_raise", name:"Перед собой блин", unit:"кг", ref:"ориент: 5–6 кг" },
    { id:"bicep_ez", name:"Подъём на бицепс EZ", unit:"кг", ref:"" },
  ]},
  thu: { exercises: [
    { id:"hyper_thu", name:"Гиперэкстензия", unit:"кг", ref:"ориент: 5–10 кг" },
    { id:"ohp", name:"Жим стоя/сидя", unit:"кг", ref:"ориент: 9 ган / 12,5 Смит" },
    { id:"laterals", name:"Махи + перед собой", unit:"кг", ref:"ориент: 5–6 кг" },
    { id:"lunges", name:"Выпады", unit:"кг", ref:"ориент: 7,5 кг" },
    { id:"hack", name:"Гак-присед", unit:"кг", ref:"ориент: 35 кг" },
    { id:"leg_ext", name:"Разгибание ног", unit:"кг", ref:"ориент: 25–35 кг" },
  ]},
  sat: { exercises: [
    { id:"hyper_sat", name:"Гиперэкстензия", unit:"кг", ref:"ориент: 5–10 кг" },
    { id:"pullups", name:"Подтягивания (резинка)", unit:"повт", ref:"ориент: 4×10-8" },
    { id:"tbar", name:"Тяга Т-грифа", unit:"кг", ref:"ориент: 10 кг · 3×12" },
    { id:"horiz_row", name:"Горизонтальная тяга", unit:"ф", ref:"ориент: 60 ф · 3×12" },
    { id:"tri_db", name:"Трицепс гантель сидя", unit:"кг", ref:"ориент: 12 кг · 4×12" },
    { id:"tri_rope", name:"Трицепс канат", unit:"ф", ref:"ориент: 50–60 ф · 3×14" },
    { id:"plank", name:"Планка на локтях", unit:"сек", ref:"ориент: 3×60 сек" },
  ]}
};

let cur = "mon";
let D = {};
try { D = JSON.parse(localStorage.getItem("gym_v4") || "{}"); } catch(e) { D = {}; }

function saveLocal() { try { localStorage.setItem("gym_v4", JSON.stringify(D)); } catch(e) {} }

function setSync(state, txt) {
  document.getElementById("sdot").className = "sync-dot " + state;
  document.getElementById("stxt").textContent = txt;
}

async function gsGet(key) {
  try {
    setSync("busy", "загрузка...");
    const r = await fetch(GS + "?action=get&key=" + encodeURIComponent(key));
    const j = await r.json();
    setSync("ok", "синхр.");
    return j.value ? JSON.parse(j.value) : null;
  } catch(e) { setSync("err", "нет связи"); return null; }
}

async function gsSet(key, value) {
  try {
    setSync("busy", "сохр...");
    const enc = encodeURIComponent(JSON.stringify(value));
    const r = await fetch(GS + "?action=set&key=" + encodeURIComponent(key) + "&value=" + enc);
    const j = await r.json();
    if (j.ok) setSync("ok", "сохранено");
    else setSync("err", "ошибка");
  } catch(e) { setSync("err", "нет связи"); }
}

function today() { return new Date().toISOString().slice(0,10); }

function exData(day, id) {
  if (!D[day]) D[day] = { date: today(), exercises: {} };
  if (!D[day].exercises) D[day].exercises = {};
  if (!D[day].exercises[id]) D[day].exercises[id] = { sets:[{weight:"",reps:""}] };
  return D[day].exercises[id];
}

function fmtSet(s, unit) {
  if (unit === "сек") return (s.reps||"?") + "с";
  if (unit === "повт") return (s.reps||"?") + "п";
  return (s.weight||"?") + unit + "×" + (s.reps||"?");
}

function calcPR(hist, unit) {
  if (!hist || !hist.length) return null;
  if (unit === "сек" || unit === "повт") {
    const m = Math.max(...hist.flatMap(h => h.sets.map(s => parseFloat(s.reps)||0)));
    return m > 0 ? m + " " + unit : null;
  }
  const m = Math.max(...hist.flatMap(h => h.sets.map(s => parseFloat(s.weight)||0)));
  return m > 0 ? m + " " + unit : null;
}

function setRowHTML(day, id, i, s, unit) {
  const simple = unit === "сек" || unit === "повт";
  const ph1 = simple ? (unit === "сек" ? "сек" : "повт") : "кг";
  const v1 = simple ? (s.reps||"") : (s.weight||"");
  const field1 = simple ? "reps" : "weight";
  const col2 = simple
    ? `<div></div>`
    : `<input class="set-inp" type="number" min="0" step="1" placeholder="повт" value="${s.reps||''}" oninput="upd('${day}','${id}',${i},'reps',this.value)">`;
  return `<div class="set-row">
    <div class="set-num">${i+1}</div>
    <input class="set-inp" type="number" min="0" step="0.5" placeholder="${ph1}" value="${v1}" oninput="upd('${day}','${id}',${i},'${field1}',this.value)">
    ${col2}
    <button class="btn-del-set" onclick="delSet('${day}','${id}',${i})">×</button>
  </div>`;
}

function renderPanel(day) {
  const panel = document.getElementById("panel-" + day);
  const savedDate = (D[day] || {}).date || today();
  const hist = D[day + "_hist"] || {};
  let html = `<div class="date-row">
    <span class="date-lbl">дата:</span>
    <input type="date" class="date-inp" value="${savedDate}" onchange="if(!D['${day}'])D['${day}']={date:today(),exercises:{}};D['${day}'].date=this.value;saveLocal()">
  </div>`;

  DAYS[day].exercises.forEach(ex => {
    const d = exData(day, ex.id);
    const exHist = hist[ex.id] || [];
    const pr = calcPR(exHist, ex.unit);
    const simple = ex.unit === "сек" || ex.unit === "повт";
    const h1 = simple ? (ex.unit === "сек" ? "сек" : "повт") : "вес " + ex.unit;
    const h2 = simple ? "" : "повт";

    html += `<div class="ex-card">
      <div class="ex-head">
        <div>
          <div class="ex-name">${ex.name}</div>
          ${ex.ref ? `<div class="ex-ref">${ex.ref}</div>` : ""}
        </div>
        <div class="ex-actions">
          ${pr ? `<span class="pr-badge">PR ${pr}</span>` : ""}
          <button class="btn-add-set" onclick="addSet('${day}','${ex.id}')">+ подход</button>
        </div>
      </div>
      <div class="sets-head">
        <span>#</span><span>${h1}</span><span>${h2}</span><span></span>
      </div>
      <div id="sets-${ex.id}">`;

    d.sets.forEach((s, i) => { html += setRowHTML(day, ex.id, i, s, ex.unit); });
    html += `</div>`;

    html += `<div class="hist-block"><div class="hist-lbl">история</div>`;
    if (exHist.length > 0) {
      exHist.slice().reverse().forEach(h => {
        const sStr = h.sets.map((s,i) => `${i+1}:${fmtSet(s,ex.unit)}`).join(" ");
        html += `<div class="hist-row">
          <div class="hist-txt"><span class="hist-date">${h.date}</span>  ${sStr}</div>
          <button class="btn-del-hist" onclick="delHist('${day}','${ex.id}','${h.date}')">×</button>
        </div>`;
      });
    } else {
      html += `<div class="hist-empty">пока пусто</div>`;
    }
    html += `</div></div>`;
  });

  panel.innerHTML = html;
}

function upd(day, id, i, field, val) {
  const d = exData(day, id);
  if (!d.sets[i]) d.sets[i] = {};
  d.sets[i][field] = val;
  saveLocal();
}

function addSet(day, id) {
  const d = exData(day, id);
  const ex = DAYS[day].exercises.find(e => e.id === id);
  d.sets.push({weight:"", reps:""});
  saveLocal();
  const cont = document.getElementById("sets-" + id);
  const i = d.sets.length - 1;
  cont.insertAdjacentHTML("beforeend", setRowHTML(day, id, i, {weight:"",reps:""}, ex.unit));
}

function delSet(day, id, i) {
  const d = exData(day, id);
  if (d.sets.length <= 1) return;
  d.sets.splice(i, 1);
  saveLocal();
  renderPanel(day);
}

async function delHist(day, id, date) {
  if (!D[day + "_hist"] || !D[day + "_hist"][id]) return;
  D[day + "_hist"][id] = D[day + "_hist"][id].filter(h => h.date !== date);
  saveLocal();
  await gsSet("hist_" + day, D[day + "_hist"]);
  showToast("запись удалена");
  renderPanel(day);
}

async function saveDay() {
  const day = cur;
  if (!D[day]) D[day] = { date: today(), exercises: {} };
  const date = D[day].date || today();
  if (!D[day + "_hist"]) D[day + "_hist"] = {};

  DAYS[day].exercises.forEach(ex => {
    const d = exData(day, ex.id);
    if (!D[day + "_hist"][ex.id]) D[day + "_hist"][ex.id] = [];
    const hist = D[day + "_hist"][ex.id];
    const idx = hist.findIndex(h => h.date === date);
    const entry = { date, sets: JSON.parse(JSON.stringify(d.sets)) };
    if (idx >= 0) hist[idx] = entry; else hist.push(entry);
    if (hist.length > 20) hist.splice(0, hist.length - 20);
  });

  saveLocal();
  await gsSet("data_" + day, D[day]);
  await gsSet("hist_" + day, D[day + "_hist"]);
  showToast("сохранено ✓");
  renderPanel(day);
}

async function loadCloud() {
  for (const day of ["mon","thu","sat"]) {
    const d = await gsGet("data_" + day);
    const h = await gsGet("hist_" + day);
    if (d) D[day] = d;
    if (h) D[day + "_hist"] = h;
  }
  saveLocal();
  renderPanel(cur);
}

function clearDay() {
  const day = cur;
  if (!D[day]) return;
  DAYS[day].exercises.forEach(ex => {
    D[day].exercises[ex.id] = { sets:[{weight:"",reps:""}] };
  });
  saveLocal();
  renderPanel(day);
}

function switchDay(key) {
  cur = key;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["mon","thu","sat"][i] === key);
  });
  document.querySelectorAll(".panel").forEach((p,i) => {
    p.classList.toggle("active", ["mon","thu","sat"][i] === key);
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

["mon","thu","sat"].forEach(d => renderPanel(d));
setSync("busy", "загрузка...");
loadCloud();
</script>
</body>
</html>
