<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gym Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#e8e8e8;--text2:#888;--text3:#555;
  --accent:#c8f060;--accent2:#a0d040;
  --danger:#ff5a5a;--success:#4caf7d;
  --up:#4caf7d;--down:#ff5a5a;--same:#666;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;}
body{max-width:480px;margin:0 auto;padding-bottom:80px;}

header{padding:16px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--accent);}
.sync-wrap{display:flex;align-items:center;gap:5px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.sync-dot.ok{background:var(--success);}
.sync-dot.busy{background:var(--accent);animation:blink 1s infinite;}
.sync-dot.err{background:var(--danger);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}

.nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:10px 16px;font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

.page{display:none;padding:16px;}
.page.active{display:block;}

/* preset selector */
.preset-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.preset-chip{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;}
.preset-chip.active{background:rgba(200,240,96,.12);color:var(--accent);border-color:rgba(200,240,96,.3);}
.preset-chip.new-btn{color:var(--text3);}

/* date row */
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.date-lbl{font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace;}
.date-inp{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);}

/* exercise card */
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;}
.ex-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;}
.ex-name{font-size:13px;font-weight:500;}
.ex-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.pr-badge{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:20px;background:rgba(200,240,96,.1);color:var(--accent);border:1px solid rgba(200,240,96,.2);white-space:nowrap;}
.btn-sm{font-size:11px;font-family:'IBM Plex Mono',monospace;padding:3px 10px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;}
.btn-sm:active{background:var(--bg3);}

/* base weight row */
.base-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.base-inp{width:60px;font-size:11px;font-family:'IBM Plex Mono',monospace;padding:3px 6px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg3);color:var(--text2);text-align:center;-webkit-appearance:none;}
.base-inp:focus{outline:none;border-color:var(--border2);}
.unit-toggle{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);}
.unit-toggle.active{color:var(--accent);border-color:rgba(200,240,96,.3);background:rgba(200,240,96,.08);}

/* sets */
.sets-head{display:grid;gap:4px;margin-bottom:4px;}
.sets-head span{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-align:center;}
.set-row{display:grid;gap:4px;margin-bottom:4px;align-items:center;}
.set-num{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-align:center;}
.set-inp{width:100%;font-size:14px;font-family:'IBM Plex Mono',monospace;padding:6px 4px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg3);color:var(--text);text-align:center;-webkit-appearance:none;}
.set-inp:focus{outline:none;border-color:var(--border2);}
.btn-del-set{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:0;}
.btn-del-set:active{color:var(--danger);}

/* volume */
.vol-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);flex-wrap:wrap;}
.vol-lbl{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.vol-val{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text2);}
.vol-delta{font-size:11px;font-family:'IBM Plex Mono',monospace;}
.vol-delta.up{color:var(--up);}
.vol-delta.down{color:var(--down);}
.vol-delta.same{color:var(--same);}

/* history */
.hist-block{margin-top:8px;}
.hist-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;background:none;border:none;padding:4px 0;color:var(--text3);font-size:11px;font-family:'IBM Plex Mono',monospace;}
.hist-arrow{font-size:9px;transition:transform .2s;}
.hist-arrow.open{transform:rotate(90deg);}
.hist-list{margin-top:6px;display:none;}
.hist-list.open{display:block;}
.hist-entry{background:var(--bg3);border-radius:var(--rs);padding:7px 10px;margin-bottom:5px;}
.hist-entry-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.hist-date{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.hist-meta{display:flex;align-items:center;gap:8px;}
.hist-vol{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text2);}
.hist-sets{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text2);line-height:1.7;}
.hist-skipped{color:var(--text3);font-style:italic;}
.btn-del-hist{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0 2px;line-height:1;flex-shrink:0;}
.btn-del-hist:active{color:var(--danger);}
.show-more{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);cursor:pointer;background:none;border:none;padding:2px 0;text-decoration:underline;text-underline-offset:2px;}

/* settings page */
.settings-section{margin-bottom:24px;}
.settings-title{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:10px;letter-spacing:.05em;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.setting-lbl{font-size:13px;color:var(--text);}
.setting-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.setting-inp{width:90px;font-size:13px;font-family:'IBM Plex Mono',monospace;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);text-align:right;}
.setting-inp:focus{outline:none;border-color:var(--accent);}

/* preset editor */
.preset-editor{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:12px;}
.preset-name-inp{width:100%;font-size:13px;font-family:'IBM Plex Mono',monospace;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);margin-bottom:10px;}
.preset-name-inp:focus{outline:none;border-color:var(--accent);}
.ex-checkbox-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.ex-checkbox-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);cursor:pointer;}
.ex-checkbox-row:hover{background:var(--bg3);}
.ex-checkbox-row input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;}
.ex-checkbox-lbl{font-size:12px;color:var(--text2);}
.btn-action{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:7px 16px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);margin-right:8px;}
.btn-action:active{background:var(--bg3);}
.btn-action.primary{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:500;}
.btn-action.danger{color:var(--danger);border-color:var(--danger);}

/* export */
.export-btn{display:block;width:100%;padding:12px;font-size:13px;font-family:'IBM Plex Mono',monospace;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);text-align:left;margin-bottom:10px;}
.export-btn:active{background:var(--bg3);}
.export-note{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:16px;line-height:1.6;}

/* bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;max-width:480px;margin:0 auto;}
.btn-main{flex:1;padding:11px;font-size:13px;font-family:'IBM Plex Mono',monospace;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);}
.btn-main:active{background:var(--bg3);}
.btn-main.primary{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:500;}
.btn-main.primary:active{background:var(--accent2);}

.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-size:12px;font-family:'IBM Plex Mono',monospace;padding:8px 16px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:100;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.lbs-hint{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-left:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">GYM_TRACKER</div>
  <div class="sync-wrap">
    <div class="sync-dot" id="sdot"></div>
    <span class="sync-txt" id="stxt">—</span>
  </div>
</header>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('workout')">тренировка</button>
  <button class="nav-btn" onclick="showPage('settings')">настройки</button>
  <button class="nav-btn" onclick="showPage('export')">экспорт</button>
</div>

<div id="page-workout" class="page active"></div>
<div id="page-settings" class="page"></div>
<div id="page-export" class="page"></div>

<div class="bottom-bar" id="bottom-bar">
  <button class="btn-main" onclick="clearDay()">Очистить</button>
  <button class="btn-main primary" onclick="saveDay()">Сохранить тренировку</button>
</div>

<div class="toast" id="toast"></div>

<script>
const GS = "https://script.google.com/macros/s/AKfycbzBrKu5a8Ipuuix4UAi6zau51NCR0QgMTcKhKwKUhl-Ww382UtQ3WTwGmDr7m-AKGRa7g/exec";

// All known exercises
const ALL_EXERCISES = [
  {id:"hyper", name:"Гиперэкстензия", unit:"кг", crossDay:true},
  {id:"chest_press", name:"Жим грудь", unit:"кг", hasBar:true},
  {id:"db_press", name:"Жим гантелей", unit:"кг"},
  {id:"butterfly", name:"Бабочка", unit:"кг"},
  {id:"front_raise", name:"Перед собой блин", unit:"кг"},
  {id:"bicep_ez", name:"Подъём на бицепс EZ", unit:"кг", hasBar:true},
  {id:"ohp", name:"Жим стоя/сидя", unit:"кг", hasBar:true},
  {id:"laterals", name:"Махи + перед собой", unit:"кг"},
  {id:"lunges", name:"Выпады", unit:"кг"},
  {id:"hack", name:"Гак-присед", unit:"кг"},
  {id:"leg_ext", name:"Разгибание ног", unit:"кг"},
  {id:"pullups", name:"Подтягивания", unit:"кг", bodyweight:true},
  {id:"tbar", name:"Тяга Т-грифа", unit:"кг", hasBar:true},
  {id:"horiz_row", name:"Горизонтальная тяга", unit:"ф"},
  {id:"tri_db", name:"Трицепс гантель сидя", unit:"кг"},
  {id:"tri_rope", name:"Трицепс канат", unit:"ф"},
  {id:"plank", name:"Планка на локтях", unit:"сек", bodyweight:true},
];

const BUILT_IN_PRESETS = [
  {id:"mon", name:"ПН · Грудь/Бицепс", exIds:["hyper","chest_press","db_press","butterfly","front_raise","bicep_ez"]},
  {id:"thu", name:"ЧТ · Ноги/Плечи", exIds:["hyper","ohp","laterals","lunges","hack","leg_ext"]},
  {id:"sat", name:"СБ · Спина/Трицепс", exIds:["hyper","pullups","tbar","horiz_row","tri_db","tri_rope","plank"]},
];

let curPage = "workout";
let curPreset = "mon";
let editingPreset = null;
let histOpen = {};
let histExpanded = {};

let D = {};
try { D = JSON.parse(localStorage.getItem("gym_v6") || "{}"); } catch(e) { D = {}; }

if (!D.settings) D.settings = { bodyWeight: 80, barWeights: { chest_press: 20, ohp: 20, bicep_ez: 7, tbar: 15 } };
if (!D.customPresets) D.customPresets = [];
if (!D.workouts) D.workouts = {};
if (!D.history) D.history = {};
if (!D.unitPref) D.unitPref = {};

function saveLocal() { try { localStorage.setItem("gym_v6", JSON.stringify(D)); } catch(e) {} }

function setSync(s, t) {
  document.getElementById("sdot").className = "sync-dot " + s;
  document.getElementById("stxt").textContent = t;
}

async function gsGet(key) {
  try {
    setSync("busy","загрузка...");
    const r = await fetch(GS + "?action=get&key=" + encodeURIComponent(key));
    const j = await r.json();
    setSync("ok","синхр.");
    return j.value ? JSON.parse(j.value) : null;
  } catch(e) { setSync("err","нет связи"); return null; }
}
async function gsSet(key, value) {
  try {
    setSync("busy","сохр...");
    const enc = encodeURIComponent(JSON.stringify(value));
    const r = await fetch(GS + "?action=set&key=" + encodeURIComponent(key) + "&value=" + enc);
    const j = await r.json();
    if (j.ok) setSync("ok","сохранено"); else setSync("err","ошибка");
  } catch(e) { setSync("err","нет связи"); }
}

function today() { return new Date().toISOString().slice(0,10); }
function allPresets() { return [...BUILT_IN_PRESETS, ...D.customPresets]; }
function getPreset(id) { return allPresets().find(p => p.id === id); }
function getEx(id) { return ALL_EXERCISES.find(e => e.id === id); }

function kgToLbs(kg) { return +(kg * 2.20462).toFixed(1); }
function lbsToKg(lbs) { return +(lbs / 2.20462).toFixed(2); }

function getWorkout(presetId) {
  if (!D.workouts[presetId]) D.workouts[presetId] = { date: today(), sets: {} };
  return D.workouts[presetId];
}
function getExSets(presetId, exId) {
  const w = getWorkout(presetId);
  if (!w.sets[exId]) w.sets[exId] = [{weight:"", reps:"", adj:""}];
  return w.sets[exId];
}

function getBaseWeight(exId) {
  const ex = getEx(exId);
  if (!ex) return 0;
  if (ex.bodyweight) return parseFloat(D.settings.bodyWeight) || 0;
  if (ex.hasBar) return parseFloat((D.settings.barWeights || {})[exId]) || 0;
  return 0;
}

function effectiveWeight(exId, setObj) {
  const base = getBaseWeight(exId);
  const added = parseFloat(setObj.weight) || 0;
  const adj = parseFloat(setObj.adj) || 0;
  return base + added + adj;
}

function calcVolume(exId, sets) {
  const ex = getEx(exId);
  if (!ex) return 0;
  if (ex.unit === "сек") {
    const bw = getBaseWeight(exId);
    return sets.reduce((s, x) => {
      const secs = parseFloat(x.reps) || 0;
      const adj = parseFloat(x.adj) || 0;
      return s + (bw + adj) * secs;
    }, 0);
  }
  if (ex.unit === "повт") return sets.reduce((s,x) => s + (parseFloat(x.reps)||0), 0);
  return sets.reduce((s,x) => {
    const ew = effectiveWeight(exId, x);
    return s + ew * (parseFloat(x.reps)||0);
  }, 0);
}

function fmtVol(vol, unit) {
  if (unit === "сек") return Math.round(vol) + " кг·с";
  if (unit === "повт") return Math.round(vol) + " повт";
  return Math.round(vol) + " кг·повт";
}

function getExHistory(exId) {
  return D.history[exId] || [];
}

function calcPR(hist, exId) {
  const ex = getEx(exId);
  if (!ex || !hist.length) return null;
  if (ex.unit === "сек" || ex.unit === "повт") {
    const m = Math.max(...hist.flatMap(h => h.sets.map(s => parseFloat(s.reps)||0)));
    return m > 0 ? m + " " + ex.unit : null;
  }
  const m = Math.max(...hist.flatMap(h => h.sets.map(s => effectiveWeightFromHist(exId, s))));
  return m > 0 ? m + " кг" : null;
}

function effectiveWeightFromHist(exId, s) {
  const ex = getEx(exId);
  if (!ex) return 0;
  const base = parseFloat(s.baseSnap) || getBaseWeight(exId);
  const added = parseFloat(s.weight) || 0;
  const adj = parseFloat(s.adj) || 0;
  return base + added + adj;
}

function fmtSetDisplay(exId, s) {
  const ex = getEx(exId);
  if (!ex) return "—";
  const r = parseFloat(s.reps);
  if (ex.unit === "сек") {
    if (isNaN(r)) return "пропущено";
    const bw = parseFloat(s.baseSnap) || getBaseWeight(exId);
    const adj = parseFloat(s.adj) || 0;
    const totalW = bw + adj;
    return (adj !== 0 ? (adj > 0 ? "+" + adj : adj) + "кг, " : "") + r + "с";
  }
  if (ex.unit === "повт") {
    if (isNaN(r)) return "пропущено";
    const adj = parseFloat(s.adj) || 0;
    return (adj !== 0 ? (adj > 0 ? "+" + adj : adj) + "кг, " : "") + r + "п";
  }
  const w = parseFloat(s.weight);
  if (isNaN(w) && isNaN(r)) return "пропущено";
  const base = parseFloat(s.baseSnap) || getBaseWeight(exId);
  const adj = parseFloat(s.adj) || 0;
  const total = base + (isNaN(w)?0:w) + adj;
  const rStr = isNaN(r) ? "?" : r;
  if (ex.unit === "ф") {
    const lbs = kgToLbs(total);
    return lbs + "ф×" + rStr + " <span class='lbs-hint'>(" + total.toFixed(1) + "кг)</span>";
  }
  return total + "кг×" + rStr;
}

function isLbs(exId) { return D.unitPref[exId] === "lbs"; }

function setRowHTML(presetId, exId, i, s) {
  const ex = getEx(exId);
  if (!ex) return "";
  const simple = ex.unit === "сек" || ex.unit === "повт";
  const useLbs = !simple && isLbs(exId);
  const base = getBaseWeight(exId);
  const hasBase = base > 0;
  const hasAdj = ex.bodyweight || ex.hasBar;

  let col1, col2, col3;

  if (ex.unit === "сек") {
    col1 = `<div></div>`;
    col2 = `<input class="set-inp" type="number" min="0" step="1" placeholder="сек" value="${s.reps||''}" oninput="updSet('${presetId}','${exId}',${i},'reps',this.value)">`;
    col3 = hasAdj
      ? `<input class="set-inp" type="number" step="0.5" placeholder="±кг" value="${s.adj||''}" oninput="updSet('${presetId}','${exId}',${i},'adj',this.value)" style="font-size:12px;">`
      : `<div></div>`;
  } else if (ex.unit === "повт") {
    col1 = `<div></div>`;
    col2 = `<input class="set-inp" type="number" min="0" step="1" placeholder="повт" value="${s.reps||''}" oninput="updSet('${presetId}','${exId}',${i},'reps',this.value)">`;
    col3 = hasAdj
      ? `<input class="set-inp" type="number" step="0.5" placeholder="±кг" value="${s.adj||''}" oninput="updSet('${presetId}','${exId}',${i},'adj',this.value)" style="font-size:12px;">`
      : `<div></div>`;
  } else {
    const dispW = useLbs && s.weight !== "" ? kgToLbs(parseFloat(s.weight)||0) : (s.weight||"");
    const ph = useLbs ? "фунты" : "кг";
    col1 = `<input class="set-inp" type="number" min="0" step="${useLbs?'0.5':'0.5'}" placeholder="${ph}" value="${dispW}" oninput="updWeight('${presetId}','${exId}',${i},this.value,${useLbs})">`;
    col2 = `<input class="set-inp" type="number" min="0" step="1" placeholder="повт" value="${s.reps||''}" oninput="updSet('${presetId}','${exId}',${i},'reps',this.value)">`;
    col3 = hasAdj
      ? `<input class="set-inp" type="number" step="0.5" placeholder="±кг" value="${s.adj||''}" oninput="updSet('${presetId}','${exId}',${i},'adj',this.value)" style="font-size:12px;">`
      : `<div></div>`;
  }

  const cols = hasAdj ? "28px 1fr 1fr 1fr 24px" : "28px 1fr 1fr 24px";
  return `<div class="set-row" style="grid-template-columns:${cols}">
    <div class="set-num">${i+1}</div>
    ${col1}${col2}${col3}
    <button class="btn-del-set" onclick="delSet('${presetId}','${exId}',${i})">×</button>
  </div>`;
}

function renderWorkout() {
  const preset = getPreset(curPreset);
  if (!preset) return;
  const w = getWorkout(curPreset);
  const p = document.getElementById("page-workout");

  const presetsHTML = allPresets().map(pr =>
    `<button class="preset-chip${pr.id===curPreset?' active':''}" onclick="switchPreset('${pr.id}')">${pr.name}</button>`
  ).join("") + `<button class="preset-chip new-btn" onclick="newPreset()">+ новый</button>`;

  let html = `<div class="preset-bar">${presetsHTML}</div>
  <div class="date-row">
    <span class="date-lbl">дата:</span>
    <input type="date" class="date-inp" value="${w.date||today()}" onchange="getWorkout('${curPreset}').date=this.value;saveLocal()">
  </div>`;

  preset.exIds.forEach(exId => {
    const ex = getEx(exId);
    if (!ex) return;
    const sets = getExSets(curPreset, exId);
    const hist = getExHistory(exId);
    const pr = calcPR(hist, exId);
    const base = getBaseWeight(exId);
    const hasBase = base > 0;
    const hasAdj = ex.bodyweight || ex.hasBar;
    const useLbs = isLbs(exId) && ex.unit !== "сек" && ex.unit !== "повт";
    const simple = ex.unit === "сек" || ex.unit === "повт";
    const cols = hasAdj ? "28px 1fr 1fr 1fr 24px" : "28px 1fr 1fr 24px";

    let h1, h2, h3;
    if (ex.unit === "сек") { h1=""; h2="сек"; h3=hasAdj?"±кг":""; }
    else if (ex.unit === "повт") { h1=""; h2="повт"; h3=hasAdj?"±кг":""; }
    else { h1=useLbs?"фунты":"кг"; h2="повт"; h3=hasAdj?"±кг":""; }

    const curVol = calcVolume(exId, sets);
    let volHTML = "";
    if (curVol > 0) {
      const lastEntry = hist.length > 0 ? hist[hist.length-1] : null;
      const prevVol = lastEntry ? calcVolume(exId, lastEntry.sets) : null;
      const maxVol = hist.length > 0 ? Math.max(...hist.map(h => calcVolume(exId, h.sets))) : 0;
      let deltas = [];
      if (prevVol !== null && prevVol > 0) {
        const d = curVol - prevVol;
        const pct = Math.round(Math.abs(d)/prevVol*100);
        if (d>0) deltas.push(`<span class="vol-delta up">▲ +${pct}% к прош.</span>`);
        else if (d<0) deltas.push(`<span class="vol-delta down">▼ −${pct}% к прош.</span>`);
        else deltas.push(`<span class="vol-delta same">= прош.</span>`);
      }
      if (maxVol > 0 && curVol > 0) {
        const d2 = curVol - maxVol;
        if (d2 > 0) deltas.push(`<span class="vol-delta up">▲ новый макс!</span>`);
        else if (maxVol > 0) {
          const pct2 = Math.round(Math.abs(d2)/maxVol*100);
          deltas.push(`<span class="vol-delta same">−${pct2}% к макс.</span>`);
        }
      }
      volHTML = `<div class="vol-row" id="vol-${exId}">
        <span class="vol-lbl">объём:</span>
        <span class="vol-val">${fmtVol(curVol, ex.unit)}</span>
        ${deltas.join(" ")}
      </div>`;
    } else {
      volHTML = `<div id="vol-${exId}"></div>`;
    }

    const isOpen = histOpen[exId];
    const isExpanded = histExpanded[exId];
    const shown = isExpanded ? hist : hist.slice(-3);
    const hasMore = hist.length > 3;

    let histEntriesHTML = hist.length === 0
      ? `<div class="hist-skipped">пока пусто</div>`
      : shown.slice().reverse().map(h => {
          const vol = calcVolume(exId, h.sets);
          const sStr = h.sets.map((s,i) => {
            const f = fmtSetDisplay(exId, s);
            return `<span${f==="пропущено"?' class="hist-skipped"':''}>${i+1}: ${f}</span>`;
          }).join("  ");
          return `<div class="hist-entry">
            <div class="hist-entry-top">
              <span class="hist-date">${h.date}</span>
              <div class="hist-meta">
                <span class="hist-vol">${fmtVol(vol,ex.unit)}</span>
                <button class="btn-del-hist" onclick="delHist('${exId}','${h.date}')">×</button>
              </div>
            </div>
            <div class="hist-sets">${sStr}</div>
          </div>`;
        }).join("") + (hasMore && !isExpanded ? `<button class="show-more" onclick="expandHist('${exId}')">показать все (${hist.length})</button>` : "");

    let baseInfo = "";
    if (hasBase) {
      const bwStr = ex.bodyweight ? `вес тела: ${base} кг` : `гриф/база: ${base} кг`;
      baseInfo = `<div class="base-row">${bwStr}${hasAdj ? " · ±отягощение в подходе" : ""}</div>`;
    }
    let unitToggle = "";
    if (!simple) {
      unitToggle = `<button class="unit-toggle${useLbs?' active':''}" onclick="toggleUnit('${exId}')">${useLbs?'фунты → кг':'кг → фунты'}</button>`;
    }

    html += `<div class="ex-card" id="card-${exId}">
      <div class="ex-head">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-actions">
          ${pr ? `<span class="pr-badge">PR ${pr}</span>` : ""}
          ${unitToggle}
          <button class="btn-sm" onclick="addSet('${curPreset}','${exId}')">+ подход</button>
        </div>
      </div>
      ${baseInfo}
      <div class="sets-head" style="grid-template-columns:${cols}">
        <span>#</span><span>${h1}</span><span>${h2}</span><span>${h3}</span>${hasAdj?"":`<span></span>`}
      </div>
      <div id="sets-${exId}">`;
    sets.forEach((s,i) => { html += setRowHTML(curPreset, exId, i, s); });
    html += `</div>
      ${volHTML}
      <div class="hist-block">
        <button class="hist-toggle" onclick="toggleHist('${exId}')">
          <span class="hist-arrow${isOpen?' open':''}">▶</span>
          <span>история${hist.length>0?' ('+hist.length+')':''}</span>
        </button>
        <div class="hist-list${isOpen?' open':''}">${histEntriesHTML}</div>
      </div>
    </div>`;
  });

  p.innerHTML = html;
}

function renderSettings() {
  const s = D.settings;
  let html = `<div class="settings-section">
    <div class="settings-title">МОЙ ВЕС</div>
    <div class="setting-row">
      <div><div class="setting-lbl">Вес тела</div><div class="setting-sub">используется для подтягиваний и планки</div></div>
      <input class="setting-inp" type="number" step="0.5" value="${s.bodyWeight||80}" onchange="D.settings.bodyWeight=parseFloat(this.value)||80;saveLocal();showToast('сохранено');" placeholder="кг"> 
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-title">БАЗОВЫЙ ВЕС СНАРЯДОВ</div>
    <div class="setting-sub" style="margin-bottom:10px;font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;">вес грифа/базы — прибавляется к каждому подходу при расчёте объёма</div>`;

  const barExes = ALL_EXERCISES.filter(e => e.hasBar);
  barExes.forEach(ex => {
    const val = (s.barWeights||{})[ex.id] || "";
    html += `<div class="setting-row">
      <div class="setting-lbl">${ex.name}</div>
      <input class="setting-inp" type="number" step="0.5" value="${val}" placeholder="кг"
        onchange="if(!D.settings.barWeights)D.settings.barWeights={};D.settings.barWeights['${ex.id}']=parseFloat(this.value)||0;saveLocal();showToast('сохранено');">
    </div>`;
  });
  html += `</div>`;

  // Preset editor
  html += `<div class="settings-section">
    <div class="settings-title">МОИ ПРЕСЕТЫ</div>`;

  D.customPresets.forEach((pr, idx) => {
    const editing = editingPreset === pr.id;
    if (editing) {
      const exChecks = ALL_EXERCISES.map(ex =>
        `<label class="ex-checkbox-row">
          <input type="checkbox" ${pr.exIds.includes(ex.id)?'checked':''} onchange="toggleExInPreset('${pr.id}','${ex.id}',this.checked)">
          <span class="ex-checkbox-lbl">${ex.name}</span>
        </label>`
      ).join("");
      html += `<div class="preset-editor">
        <input class="preset-name-inp" placeholder="Название пресета" value="${pr.name}"
          oninput="D.customPresets[${idx}].name=this.value;saveLocal()">
        <div class="ex-checkbox-list">${exChecks}</div>
        <button class="btn-action primary" onclick="editingPreset=null;renderSettings()">Готово</button>
        <button class="btn-action danger" onclick="deletePreset('${pr.id}')">Удалить</button>
      </div>`;
    } else {
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
        <div>
          <div style="font-size:13px;">${pr.name}</div>
          <div style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:2px;">${pr.exIds.length} упражнений</div>
        </div>
        <button class="btn-action" onclick="editingPreset='${pr.id}';renderSettings()">изменить</button>
      </div>`;
    }
  });

  html += `<button class="btn-action" style="margin-top:12px;" onclick="createNewPreset()">+ создать пресет</button>
  </div>`;

  document.getElementById("page-settings").innerHTML = html;
}

function renderExport() {
  document.getElementById("page-export").innerHTML = `
    <div class="export-note">Скачать историю по упражнению или всю сразу в формате CSV — открывается в Excel и Google Sheets.</div>
    <button class="export-btn" onclick="exportAll()">📥 Скачать всю историю (CSV)</button>
    ${ALL_EXERCISES.map(ex => `<button class="export-btn" onclick="exportEx('${ex.id}')">${ex.name}</button>`).join("")}
  `;
}

function exportAll() {
  let rows = ["дата,упражнение,подход,вес(кг),повт/сек,отягощение,объём"];
  ALL_EXERCISES.forEach(ex => {
    const hist = getExHistory(ex.id);
    hist.forEach(h => {
      h.sets.forEach((s, i) => {
        const w = parseFloat(s.weight)||0;
        const r = parseFloat(s.reps)||0;
        const adj = parseFloat(s.adj)||0;
        const base = parseFloat(s.baseSnap)||getBaseWeight(ex.id);
        const vol = ex.unit==="сек" ? (base+adj)*r : ex.unit==="повт" ? r : (base+w+adj)*r;
        rows.push([h.date,`"${ex.name}"`,i+1,base+w+adj,r,adj,Math.round(vol)].join(","));
      });
    });
  });
  downloadCSV(rows.join("\n"), "gym_history.csv");
}

function exportEx(exId) {
  const ex = getEx(exId);
  if (!ex) return;
  const hist = getExHistory(exId);
  let rows = ["дата,подход,вес(кг),повт/сек,отягощение,объём"];
  hist.forEach(h => {
    h.sets.forEach((s, i) => {
      const w = parseFloat(s.weight)||0;
      const r = parseFloat(s.reps)||0;
      const adj = parseFloat(s.adj)||0;
      const base = parseFloat(s.baseSnap)||getBaseWeight(exId);
      const vol = ex.unit==="сек" ? (base+adj)*r : ex.unit==="повт" ? r : (base+w+adj)*r;
      rows.push([h.date,i+1,base+w+adj,r,adj,Math.round(vol)].join(","));
    });
  });
  downloadCSV(rows.join("\n"), ex.name.replace(/\s/g,"_") + ".csv");
}

function downloadCSV(content, filename) {
  const bom = "\uFEFF";
  const blob = new Blob([bom+content], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function switchPreset(id) { curPreset = id; renderWorkout(); }

function newPreset() { showPage("settings"); createNewPreset(); }

function createNewPreset() {
  const id = "custom_" + Date.now();
  D.customPresets.push({id, name:"Новый пресет", exIds:[]});
  saveLocal();
  editingPreset = id;
  renderSettings();
}

function deletePreset(id) {
  D.customPresets = D.customPresets.filter(p => p.id !== id);
  editingPreset = null;
  if (curPreset === id) curPreset = "mon";
  saveLocal();
  renderSettings();
}

function toggleExInPreset(presetId, exId, checked) {
  const pr = D.customPresets.find(p => p.id === presetId);
  if (!pr) return;
  if (checked && !pr.exIds.includes(exId)) pr.exIds.push(exId);
  if (!checked) pr.exIds = pr.exIds.filter(e => e !== exId);
  saveLocal();
}

function toggleUnit(exId) {
  D.unitPref[exId] = isLbs(exId) ? "kg" : "lbs";
  saveLocal();
  renderWorkout();
}

function updSet(presetId, exId, i, field, val) {
  const sets = getExSets(presetId, exId);
  if (!sets[i]) sets[i] = {};
  sets[i][field] = val;
  saveLocal();
  updateVolDisplay(exId);
}

function updWeight(presetId, exId, i, val, fromLbs) {
  const sets = getExSets(presetId, exId);
  if (!sets[i]) sets[i] = {};
  sets[i].weight = fromLbs ? lbsToKg(parseFloat(val)||0) : val;
  saveLocal();
  updateVolDisplay(exId);
}

function updateVolDisplay(exId) {
  const ex = getEx(exId);
  if (!ex) return;
  const sets = getExSets(curPreset, exId);
  const hist = getExHistory(exId);
  const curVol = calcVolume(exId, sets);
  const el = document.getElementById("vol-" + exId);
  if (!el) return;
  if (curVol <= 0) { el.innerHTML = ""; return; }
  const lastEntry = hist.length > 0 ? hist[hist.length-1] : null;
  const prevVol = lastEntry ? calcVolume(exId, lastEntry.sets) : null;
  const maxVol = hist.length > 0 ? Math.max(...hist.map(h => calcVolume(exId, h.sets))) : 0;
  let deltas = [];
  if (prevVol !== null && prevVol > 0) {
    const d = curVol - prevVol; const pct = Math.round(Math.abs(d)/prevVol*100);
    if (d>0) deltas.push(`<span class="vol-delta up">▲ +${pct}% к прош.</span>`);
    else if (d<0) deltas.push(`<span class="vol-delta down">▼ −${pct}% к прош.</span>`);
    else deltas.push(`<span class="vol-delta same">= прош.</span>`);
  }
  if (maxVol > 0) {
    const d2 = curVol - maxVol;
    if (d2 > 0) deltas.push(`<span class="vol-delta up">▲ новый макс!</span>`);
    else { const pct2 = Math.round(Math.abs(d2)/maxVol*100); deltas.push(`<span class="vol-delta same">−${pct2}% к макс.</span>`); }
  }
  el.innerHTML = `<div class="vol-row"><span class="vol-lbl">объём:</span><span class="vol-val">${fmtVol(curVol,ex.unit)}</span>${deltas.join(" ")}</div>`;
}

function addSet(presetId, exId) {
  const sets = getExSets(presetId, exId);
  sets.push({weight:"", reps:"", adj:""});
  saveLocal();
  const cont = document.getElementById("sets-" + exId);
  const i = sets.length - 1;
  cont.insertAdjacentHTML("beforeend", setRowHTML(presetId, exId, i, sets[i]));
}

function delSet(presetId, exId, i) {
  const sets = getExSets(presetId, exId);
  if (sets.length <= 1) return;
  sets.splice(i, 1);
  saveLocal();
  renderWorkout();
}

function toggleHist(exId) { histOpen[exId] = !histOpen[exId]; renderWorkout(); }
function expandHist(exId) { histExpanded[exId] = true; renderWorkout(); }

async function delHist(exId, date) {
  if (!D.history[exId]) return;
  D.history[exId] = D.history[exId].filter(h => h.date !== date);
  saveLocal();
  await gsSet("hist2_" + exId, D.history[exId]);
  showToast("запись удалена");
  renderWorkout();
}

async function saveDay() {
  const preset = getPreset(curPreset);
  if (!preset) return;
  const w = getWorkout(curPreset);
  const date = w.date || today();

  preset.exIds.forEach(exId => {
    const ex = getEx(exId);
    if (!ex) return;
    if (!D.history[exId]) D.history[exId] = [];
    const hist = D.history[exId];
    const sets = getExSets(curPreset, exId);
    const setsSnap = sets.map(s => ({...s, baseSnap: getBaseWeight(exId)}));
    const idx = hist.findIndex(h => h.date === date);
    const entry = {date, sets: JSON.parse(JSON.stringify(setsSnap))};
    if (idx >= 0) hist[idx] = entry; else hist.push(entry);
    if (hist.length > 20) hist.splice(0, hist.length - 20);
  });

  saveLocal();

  for (const exId of preset.exIds) {
    await gsSet("hist2_" + exId, D.history[exId]);
  }
  await gsSet("workout_" + curPreset, w);
  await gsSet("settings", D.settings);

  showToast("сохранено ✓");
  renderWorkout();
}

function clearDay() {
  const preset = getPreset(curPreset);
  if (!preset) return;
  const w = getWorkout(curPreset);
  w.sets = {};
  saveLocal();
  renderWorkout();
}

async function loadCloud() {
  const allExIds = [...new Set(ALL_EXERCISES.map(e => e.id))];
  for (const exId of allExIds) {
    const h = await gsGet("hist2_" + exId);
    if (h) D.history[exId] = h;
  }
  for (const pr of allPresets()) {
    const w = await gsGet("workout_" + pr.id);
    if (w) D.workouts[pr.id] = w;
  }
  const settings = await gsGet("settings");
  if (settings) D.settings = settings;
  saveLocal();
  renderWorkout();
  renderSettings();
}

function showPage(name) {
  curPage = name;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach((b,i) => b.classList.toggle("active", ["workout","settings","export"][i]===name));
  document.getElementById("page-" + name).classList.add("active");
  document.getElementById("bottom-bar").style.display = name === "workout" ? "flex" : "none";
  if (name === "settings") renderSettings();
  if (name === "export") renderExport();
  if (name === "workout") renderWorkout();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

renderWorkout();
renderSettings();
renderExport();
setSync("busy","загрузка...");
loadCloud();
</script>
</body>
</html>
