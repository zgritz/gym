<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gym Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#e8e8e8;--text2:#888;--text3:#555;
  --accent:#c8f060;--accent2:#a0d040;
  --danger:#ff5a5a;--success:#4caf7d;
  --up:#4caf7d;--dn:#ff5a5a;--eq:#666;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;}
body{max-width:480px;margin:0 auto;padding-bottom:80px;}

header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:20;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--accent);}
.sw{display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.dot.ok{background:var(--success);}.dot.busy{background:var(--accent);animation:blink 1s infinite;}.dot.err{background:var(--danger);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}

.nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:10px 16px;font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.nb.active{color:var(--accent);border-bottom-color:var(--accent);}

.page{display:none;padding:16px;}.page.active{display:block;}

.chips{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.chip{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;}
.chip.on{background:rgba(200,240,96,.12);color:var(--accent);border-color:rgba(200,240,96,.3);}
.chip.dim{color:var(--text3);}

.drow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.dlbl{font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace;}
.dinp{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);}

/* exercise card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;position:relative;}
.card.drag-over{border-color:var(--accent)!important;}
.card.dragging{opacity:.4;}

/* superset card */
.ss-card{border:1px solid var(--border2);border-radius:var(--r);margin-bottom:10px;}
.ss-card.drag-over{border-color:var(--accent)!important;}
.ss-card.dragging{opacity:.4;}
.ss-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;}
.ss-label{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;}
.ss-body{padding:12px;}

.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;}
.cn{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;line-height:1;user-select:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.ca{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.badge{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:20px;background:rgba(200,240,96,.1);color:var(--accent);border:1px solid rgba(200,240,96,.2);white-space:nowrap;}
.bxs{font-size:11px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;}
.bxs:active{background:var(--bg3);}
.bxs.on{color:var(--accent);border-color:rgba(200,240,96,.3);background:rgba(200,240,96,.08);}
.binfo{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:8px;}

/* superset inner exercises — separator */
.ss-ex+.ss-ex{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ss-ex-name{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;}

.sh{display:grid;grid-template-columns:28px 1fr 1fr 24px;gap:4px;margin-bottom:4px;}
.sh span{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-align:center;}
.sr{display:grid;grid-template-columns:28px 1fr 1fr 24px;gap:4px;margin-bottom:4px;align-items:center;}
.sn{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-align:center;}
.si{width:100%;font-size:14px;font-family:'IBM Plex Mono',monospace;padding:6px 4px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg3);color:var(--text);text-align:center;-webkit-appearance:none;}
.si:focus{outline:none;border-color:var(--border2);}
.si.sm{font-size:12px;}
.ds{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:0;}
.ds:active{color:var(--danger);}

.vbl{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.vr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.vlbl{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.vval{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text2);}
.vd{font-size:11px;font-family:'IBM Plex Mono',monospace;}
.vd.up{color:var(--up);}.vd.dn{color:var(--dn);}.vd.eq{color:var(--eq);}
.kcal{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);margin-left:4px;}

.hbl{margin-top:8px;}
.htog{display:flex;align-items:center;gap:6px;cursor:pointer;background:none;border:none;padding:4px 0;color:var(--text3);font-size:11px;font-family:'IBM Plex Mono',monospace;}
.harr{font-size:9px;transition:transform .2s;}.harr.open{transform:rotate(90deg);}
.hlist{margin-top:6px;display:none;}.hlist.open{display:block;}
.he{background:var(--bg3);border-radius:var(--rs);padding:7px 10px;margin-bottom:5px;}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.hdate2{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.hm{display:flex;align-items:center;gap:6px;}
.hv{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text2);}
.hs{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text2);line-height:1.7;}
.sk{color:var(--text3);font-style:italic;}
.dh{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px;line-height:1;}
.dh:active{color:var(--danger);}
.eh{background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:11px;font-family:'IBM Plex Mono',monospace;padding:0 4px;text-decoration:underline;text-underline-offset:2px;}
.mbtn{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);cursor:pointer;background:none;border:none;padding:2px 0;text-decoration:underline;text-underline-offset:2px;}

/* total row */
.total-row{display:flex;gap:16px;padding:10px 0;border-top:1px solid var(--border);margin-top:4px;flex-wrap:wrap;}
.total-item{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text2);}
.total-item span{color:var(--accent);}

/* settings */
.ss-sec{margin-bottom:24px;}
.st{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.slbl{font-size:13px;}.ssub{font-size:11px;color:var(--text3);margin-top:2px;}
.sinp{width:90px;font-size:13px;font-family:'IBM Plex Mono',monospace;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text);text-align:right;}
.sinp:focus{outline:none;border-color:var(--accent);}
.editor{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:12px;}
.einp{width:100%;font-size:13px;font-family:'IBM Plex Mono',monospace;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);margin-bottom:8px;}
.einp:focus{outline:none;border-color:var(--accent);}
.esel{width:100%;font-size:12px;font-family:'IBM Plex Mono',monospace;padding:6px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);margin-bottom:8px;}
.esel:focus{outline:none;border-color:var(--accent);}
.flags{display:flex;gap:14px;margin-bottom:8px;flex-wrap:wrap;}
.flags label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;}
.flags input[type=checkbox]{accent-color:var(--accent);}
.ecr{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);}
.ecr:hover{background:var(--bg3);}
.ecl{font-size:12px;color:var(--text2);flex:1;}
.ecm{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.note{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin:4px 0 8px;line-height:1.5;}
.br{display:flex;gap:8px;flex-wrap:wrap;}
.ba{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:7px 14px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);}
.ba:active{background:var(--bg3);}
.ba.primary{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:500;}
.ba.danger{color:var(--danger);border-color:rgba(255,90,90,.35);}
.ba.ghost{color:var(--text3);}
.ba.sm{padding:4px 10px;font-size:11px;}

.drag-item{cursor:grab;display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);}
.drag-item:hover{background:var(--bg3);}
.drag-item.drag-over-item{background:rgba(200,240,96,.08);outline:1px solid var(--accent);}

/* export */
.expbtn{display:block;width:100%;padding:12px 14px;font-size:13px;font-family:'IBM Plex Mono',monospace;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);text-align:left;margin-bottom:8px;}
.expbtn:active{background:var(--bg3);}
.expnote{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:14px;line-height:1.6;}
.exp-preview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-top:12px;}

/* bottom */
.bbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;max-width:480px;margin:0 auto;}
.bm{flex:1;padding:11px;font-size:13px;font-family:'IBM Plex Mono',monospace;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);}
.bm:active{background:var(--bg3);}
.bm.primary{background:var(--accent);color:#0f0f0f;border-color:transparent;font-weight:500;}
.bm.primary:active{background:var(--accent2);}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:20px;width:100%;max-width:360px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:14px;font-weight:500;margin-bottom:8px;}
.modal-text{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;flex-wrap:wrap;}

.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-size:12px;font-family:'IBM Plex Mono',monospace;padding:8px 16px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:100;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <div class="logo">GYM_TRACKER</div>
  <div class="sw"><div class="dot" id="sdot"></div><span class="stxt" id="stxt">—</span></div>
</header>
<div class="nav">
  <button class="nb active" onclick="showPage('workout')">тренировка</button>
  <button class="nb" onclick="showPage('settings')">настройки</button>
  <button class="nb" onclick="showPage('export')">экспорт</button>
</div>
<div id="pg-workout" class="page active"></div>
<div id="pg-settings" class="page"></div>
<div id="pg-export" class="page"></div>
<div class="bbar" id="bbar">
  <button class="bm" onclick="clearDay()">Очистить</button>
  <button class="bm primary" onclick="saveDay()">Сохранить тренировку</button>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
const GS="https://script.google.com/macros/s/AKfycbzBrKu5a8Ipuuix4UAi6zau51NCR0QgMTcKhKwKUhl-Ww382UtQ3WTwGmDr7m-AKGRa7g/exec";

// ── default data ──────────────────────────────────────────────────────────────
// Exercise fields:
//   defaultUnit: кг|ф|повт|сек
//   hasBar: base weight from settings
//   bodyweight: base = body weight, shows ±adj column
//   bwFactor: partial bodyweight coefficient (only valid when bodyweight=true)
//   kcalFactor: kcal per kg·rep (approx)
//   crossDay: history shared across all presets (true for all by default now)

// Superset fields:
//   id, name, exIds[], kcalFactor (avg)

const DEF_EX=[
  {id:"hyper",      name:"Гиперэкстензия",       defaultUnit:"кг", bodyweight:true, bwFactor:0.5, kcalFactor:0.08},
  {id:"chest_press",name:"Жим грудь",             defaultUnit:"кг", hasBar:true,  kcalFactor:0.12},  // штанга — полный вес
  {id:"db_press",   name:"Жим гантелей",          defaultUnit:"кг", kcalFactor:0.22},  // 2 гантели — коэф ×2
  {id:"butterfly",  name:"Бабочка",               defaultUnit:"кг", kcalFactor:0.09},  // тренажёр — полный вес
  {id:"front_raise",name:"Перед собой блин",      defaultUnit:"кг", kcalFactor:0.08},  // один блин — полный вес
  {id:"bicep_ez",   name:"Подъём на бицепс EZ",  defaultUnit:"кг", hasBar:true,  kcalFactor:0.09},  // штанга
  {id:"ohp",        name:"Жим стоя/сидя",         defaultUnit:"кг", hasBar:true,  kcalFactor:0.11},  // штанга или 2 ган — если гантели ставь 0.22
  {id:"lunges",     name:"Выпады",                defaultUnit:"кг", kcalFactor:0.10},
  {id:"hack",       name:"Гак-присед",            defaultUnit:"кг", kcalFactor:0.12},
  {id:"leg_ext",    name:"Разгибание ног",        defaultUnit:"кг", kcalFactor:0.09},
  {id:"pullups",    name:"Подтягивания",          defaultUnit:"кг", bodyweight:true, kcalFactor:0.13},
  {id:"tbar",       name:"Тяга Т-грифа",          defaultUnit:"кг", hasBar:true,  kcalFactor:0.11},
  {id:"horiz_row",  name:"Горизонтальная тяга",   defaultUnit:"ф",  kcalFactor:0.10},
  {id:"tri_db",     name:"Трицепс гантель сидя",  defaultUnit:"кг", kcalFactor:0.08},  // одна рука — без удвоения
  {id:"tri_rope",   name:"Трицепс канат",         defaultUnit:"ф",  kcalFactor:0.08},
  {id:"plank",      name:"Планка на локтях",      defaultUnit:"сек", bodyweight:true, kcalFactor:0.05},
];

// "Махи + перед собой" is a superset
const DEF_SS=[
  {id:"laterals_ss", name:"Махи + перед собой", exIds:["laterals_ex","front_raise"], kcalFactor:0.09},
];
// laterals_ex is a standalone exercise only used inside this superset
const DEF_EX_EXTRA=[
  {id:"laterals_ex", name:"Махи в стороны", defaultUnit:"кг", kcalFactor:0.18},  // 2 гантели — коэф ×2
];

const DEF_PRESETS=[
  {id:"mon", name:"ПН · Грудь/Бицепс",  items:[
    {type:"ex",id:"hyper"},{type:"ex",id:"chest_press"},{type:"ex",id:"db_press"},
    {type:"ex",id:"butterfly"},{type:"ex",id:"front_raise"},{type:"ex",id:"bicep_ez"}
  ]},
  {id:"thu", name:"ЧТ · Ноги/Плечи", items:[
    {type:"ex",id:"hyper"},{type:"ex",id:"ohp"},
    {type:"ss",id:"laterals_ss"},
    {type:"ex",id:"lunges"},{type:"ex",id:"hack"},{type:"ex",id:"leg_ext"}
  ]},
  {id:"sat", name:"СБ · Спина/Трицепс", items:[
    {type:"ex",id:"hyper"},{type:"ex",id:"pullups"},{type:"ex",id:"tbar"},
    {type:"ex",id:"horiz_row"},{type:"ex",id:"tri_db"},{type:"ex",id:"tri_rope"},{type:"ex",id:"plank"}
  ]},
];

function freshD(){
  return{
    settings:{bodyWeight:74,bodyHeight:192,bodyFat:14,barWeights:{chest_press:20,ohp:20,bicep_ez:7,tbar:15}},
    exercises:JSON.parse(JSON.stringify([...DEF_EX,...DEF_EX_EXTRA])),
    supersets:JSON.parse(JSON.stringify(DEF_SS)),
    presets:JSON.parse(JSON.stringify(DEF_PRESETS)),
    workouts:{},history:{},ssHistory:{},unitPref:{}
  };
}

let D={};
try{D=JSON.parse(localStorage.getItem("gym_v11")||"{}");}catch(e){}
if(!D.settings||!D.exercises||!D.presets||!D.supersets){D=freshD();}
if(!D.ssHistory)D.ssHistory={};

let curPage="workout",curPreset=D.presets[0]?.id||"mon";
let editPreset=null,editEx=null,editSS=null;
let showNewExForm=false,showNewSSForm=false;
let histOpen={},histExp={};
let dragSrc=null,dragOver_=null;

// ── sync ──────────────────────────────────────────────────────────────────────
function sl(){try{localStorage.setItem("gym_v11",JSON.stringify(D));}catch(e){}}
function ssync(s,t){document.getElementById("sdot").className="dot "+s;document.getElementById("stxt").textContent=t;}
async function gsGet(key){
  try{ssync("busy","загрузка...");const r=await fetch(GS+"?action=get&key="+encodeURIComponent(key));const j=await r.json();ssync("ok","синхр.");return j.value?JSON.parse(j.value):null;}
  catch(e){ssync("err","нет связи");return null;}
}
async function gsSet(key,val){
  try{ssync("busy","сохр...");const r=await fetch(GS+"?action=set&key="+encodeURIComponent(key)+"&value="+encodeURIComponent(JSON.stringify(val)));const j=await r.json();if(j.ok)ssync("ok","сохранено");else ssync("err","ошибка");}
  catch(e){ssync("err","нет связи");}
}

// ── helpers ───────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function kgToLbs(kg){return+(kg*2.20462).toFixed(1);}
function lbsToKg(lbs){return+(lbs/2.20462).toFixed(2);}
function getEx(id){return D.exercises.find(e=>e.id===id);}
function getSS(id){return D.supersets.find(s=>s.id===id);}
function getPr(id){return D.presets.find(p=>p.id===id);}
function dispUnit(exId){
  const ex=getEx(exId);if(!ex)return"кг";
  const p=D.unitPref[exId];
  if(p==="lbs")return"ф";if(p==="kg")return"кг";
  return ex.defaultUnit||"кг";
}
function isLbs(exId){return dispUnit(exId)==="ф";}

function getW(pid){if(!D.workouts[pid])D.workouts[pid]={date:today(),sets:{},ssSets:{}};return D.workouts[pid];}
function getSets(pid,exId){const w=getW(pid);if(!w.sets[exId])w.sets[exId]=[{weight:"",reps:"",adj:""}];return w.sets[exId];}
// ssSets[ssId] = [{exId: {weight,reps,adj}, exId2: ...}, ...] — one object per round
function getSSRounds(pid,ssId){
  const w=getW(pid);
  if(!w.ssSets)w.ssSets={};
  if(!w.ssSets[ssId]){
    const ss=getSS(ssId);
    const empty={};
    (ss?.exIds||[]).forEach(id=>{empty[id]={weight:"",reps:"",adj:""};});
    w.ssSets[ssId]=[JSON.parse(JSON.stringify(empty))];
  }
  return w.ssSets[ssId];
}

function baseW(exId){
  const ex=getEx(exId);if(!ex)return 0;
  const bw=parseFloat(D.settings.bodyWeight)||74;
  if(ex.bodyweight){const f=ex.bwFactor||1;return bw*f;}
  if(ex.hasBar)return parseFloat((D.settings.barWeights||{})[exId])||0;
  return 0;
}
function effW(exId,s){
  const ex=getEx(exId);if(!ex)return 0;
  const base=baseW(exId);
  if(ex.bodyweight)return base+(parseFloat(s.adj)||0);
  return base+(parseFloat(s.weight)||0);
}

function calcVol(exId,sets){
  const ex=getEx(exId);if(!ex||!sets?.length)return 0;
  const du=ex.defaultUnit||"кг";
  if(du==="сек")return sets.reduce((a,x)=>{const bs=parseFloat(x.baseSnap)||baseW(exId);return a+(bs+(parseFloat(x.adj)||0))*(parseFloat(x.reps)||0);},0);
  if(du==="повт")return sets.reduce((a,x)=>a+(parseFloat(x.reps)||0),0);
  return sets.reduce((a,x)=>a+effW(exId,x)*(parseFloat(x.reps)||0),0);
}
function calcKcalEx(exId,sets){
  const ex=getEx(exId);if(!ex||!sets?.length)return 0;
  const f=ex.kcalFactor||0.1;
  const du=ex.defaultUnit||"кг";
  if(du==="сек")return sets.reduce((a,x)=>{const bs=parseFloat(x.baseSnap)||baseW(exId);return a+(bs+(parseFloat(x.adj)||0))*(parseFloat(x.reps)||0)*f;},0);
  if(du==="повт")return sets.reduce((a,x)=>a+(parseFloat(x.reps)||0)*f*parseFloat(D.settings.bodyWeight||74),0);
  return sets.reduce((a,x)=>a+effW(exId,x)*(parseFloat(x.reps)||0)*f,0);
}
function calcKcalSS(ssId,rounds){
  const ss=getSS(ssId);if(!ss||!rounds?.length)return 0;
  return rounds.reduce((total,round)=>{
    return total+(ss.exIds||[]).reduce((a,exId)=>{
      const s=round[exId]||{};const ex=getEx(exId);if(!ex)return a;
      const f=ex.kcalFactor||0.1;
      return a+effW(exId,s)*(parseFloat(s.reps)||0)*f;
    },0);
  },0);
}
function calcVolSS(ssId,rounds){
  // total volume = sum of all exercises in all rounds
  const ss=getSS(ssId);if(!ss||!rounds?.length)return 0;
  return rounds.reduce((t,round)=>{
    return t+(ss.exIds||[]).reduce((a,exId)=>{
      const s=round[exId]||{};return a+effW(exId,s)*(parseFloat(s.reps)||0);
    },0);
  },0);
}
function fmtVol(v,du){
  if(du==="сек")return Math.round(v)+" кг·с";
  if(du==="повт")return Math.round(v)+" повт";
  return Math.round(v)+" кг·повт";
}
function getHist(exId){return D.history[exId]||[];}
function getSSHist(ssId){return D.ssHistory[ssId]||[];}
function calcPR(exId){
  const ex=getEx(exId);const h=getHist(exId);if(!ex||!h.length)return null;
  const du=ex.defaultUnit||"кг";
  if(du==="сек"||du==="повт"){const m=Math.max(...h.flatMap(e=>e.sets.map(s=>parseFloat(s.reps)||0)));return m>0?m+" "+du:null;}
  const m=Math.max(...h.flatMap(e=>e.sets.map(s=>{const base=parseFloat(s.baseSnap)||baseW(exId);return ex.bodyweight?base+(parseFloat(s.adj)||0):base+(parseFloat(s.weight)||0);})));
  return m>0?m+" кг":null;
}
function calcPRSS(ssId){
  const h=getSSHist(ssId);if(!h.length)return null;
  const m=Math.max(...h.map(e=>calcVolSS(ssId,e.rounds)));
  return m>0?Math.round(m)+" кг·повт":null;
}
function fmtSetHist(exId,s){
  const ex=getEx(exId);if(!ex)return"—";
  const du=ex.defaultUnit||"кг";
  const r=parseFloat(s.reps);if(isNaN(r))return"пропущено";
  const adj=parseFloat(s.adj)||0;
  if(du==="сек")return(adj!==0?(adj>0?"+"+adj:String(adj))+"кг ":"")+r+"с";
  if(du==="повт")return(adj!==0?(adj>0?"+"+adj:String(adj))+"кг ":"")+r+"п";
  const base=parseFloat(s.baseSnap)||baseW(exId);
  const total=ex.bodyweight?base+adj:base+(parseFloat(s.weight)||0);
  return total+"кг×"+r;
}

// ── set row HTML (for single exercise) ───────────────────────────────────────
function setRowHTML(pid,exId,i,s,isSS){

// ── vol block ─────────────────────────────────────────────────────────────────
function buildVolBlock(id,vol,prevVol,maxVol,du,kcal){
  if(vol<=0)return`<div id="vol-${id}"></div>`;
  const dl=[];
  if(prevVol!==null&&prevVol>0){const d=vol-prevVol,p=Math.round(Math.abs(d)/prevVol*100);if(d>0)dl.push(`<span class="vd up">▲ +${p}% к прош.</span>`);else if(d<0)dl.push(`<span class="vd dn">▼ −${p}% к прош.</span>`);else dl.push(`<span class="vd eq">= прош.</span>`);}
  if(maxVol>0){const d2=vol-maxVol;if(d2>0)dl.push(`<span class="vd up">▲ новый макс!</span>`);else{const p2=Math.round(Math.abs(d2)/maxVol*100);dl.push(`<span class="vd eq">−${p2}% к макс.</span>`);}}
  const kcalStr=kcal>0?`<span class="kcal">~${Math.round(kcal)} ккал</span>`:"";
  return`<div id="vol-${id}" class="vbl"><div class="vr"><span class="vlbl">объём:</span><span class="vval">${fmtVol(vol,du)}</span>${dl.join(" ")}${kcalStr}</div></div>`;
}
function buildVol(exId,sets){
  const ex=getEx(exId);if(!ex)return`<div id="vol-${exId}"></div>`;
  const du=ex.defaultUnit||"кг";
  const vol=calcVol(exId,sets);
  const hist=getHist(exId);
  const prev=hist.length?calcVol(exId,hist[hist.length-1].sets):null;
  const maxV=hist.length?Math.max(...hist.map(h=>calcVol(exId,h.sets))):0;
  const kcal=calcKcalEx(exId,sets);
  return buildVolBlock(exId,vol,prev,maxV,du,kcal);
}
function buildVolSS(ssId,rounds){
  const ss=getSS(ssId);if(!ss)return`<div id="vol-${ssId}"></div>`;
  const vol=calcVolSS(ssId,rounds);
  const hist=getSSHist(ssId);
  const prev=hist.length?calcVolSS(ssId,hist[hist.length-1].rounds):null;
  const maxV=hist.length?Math.max(...hist.map(h=>calcVolSS(ssId,h.rounds))):0;
  const kcal=calcKcalSS(ssId,rounds);
  return buildVolBlock(ssId,vol,prev,maxV,"кг",kcal);
}

// ── history blocks ────────────────────────────────────────────────────────────
function buildHist(exId){
  const ex=getEx(exId);if(!ex)return"";
  const du=ex.defaultUnit||"кг";
  const hist=getHist(exId);
  const open=histOpen["ex_"+exId],exp=histExp["ex_"+exId];
  const shown=exp?hist:hist.slice(-3);const hasMore=hist.length>3;
  let entries=!hist.length?`<div class="sk">пока пусто</div>`
    :shown.slice().reverse().map(h=>{
        const vol=calcVol(exId,h.sets);
        const sStr=h.sets.map((s,i)=>`${i+1}: ${fmtSetHist(exId,s)}`).join("  ");
        return`<div class="he"><div class="htop"><span class="hdate2">${h.date}</span><div class="hm"><span class="hv">${fmtVol(vol,du)}</span><button class="eh" onclick="openEditHist('ex','${exId}','${h.date}')">ред.</button><button class="dh" onclick="askDelHist('ex','${exId}','${h.date}')">×</button></div></div><div class="hs">${sStr}</div></div>`;
      }).join("")+(hasMore&&!exp?`<button class="mbtn" onclick="histExp['ex_${exId}']=true;renderWorkout()">все (${hist.length})</button>`:"");
  return`<div class="hbl"><button class="htog" onclick="histOpen['ex_${exId}']=!histOpen['ex_${exId}'];renderWorkout()"><span class="harr${open?" open":""}">▶</span><span>история${hist.length?` (${hist.length})`:""}</span></button><div class="hlist${open?" open":""}">${entries}</div></div>`;
}
function buildHistSS(ssId){
  const ss=getSS(ssId);if(!ss)return"";
  const hist=getSSHist(ssId);
  const open=histOpen["ss_"+ssId],exp=histExp["ss_"+ssId];
  const shown=exp?hist:hist.slice(-3);const hasMore=hist.length>3;
  let entries=!hist.length?`<div class="sk">пока пусто</div>`
    :shown.slice().reverse().map(h=>{
        const vol=calcVolSS(ssId,h.rounds);
        const rStr=h.rounds.map((round,i)=>{
          const parts=(ss.exIds||[]).map(exId=>{const s=round[exId]||{};return fmtSetHist(exId,s);});
          return`${i+1}: ${parts.join(" + ")}`;
        }).join("  ");
        return`<div class="he"><div class="htop"><span class="hdate2">${h.date}</span><div class="hm"><span class="hv">~${Math.round(vol)} кг·повт</span><button class="eh" onclick="openEditHist('ss','${ssId}','${h.date}')">ред.</button><button class="dh" onclick="askDelHist('ss','${ssId}','${h.date}')">×</button></div></div><div class="hs">${rStr}</div></div>`;
      }).join("")+(hasMore&&!exp?`<button class="mbtn" onclick="histExp['ss_${ssId}']=true;renderWorkout()">все (${hist.length})</button>`:"");
  return`<div class="hbl"><button class="htog" onclick="histOpen['ss_${ssId}']=!histOpen['ss_${ssId}'];renderWorkout()"><span class="harr${open?" open":""}">▶</span><span>история${hist.length?` (${hist.length})`:""}</span></button><div class="hlist${open?" open":""}">${entries}</div></div>`;
}

// ── workout render ────────────────────────────────────────────────────────────
function renderWorkout(){
  const pr=getPr(curPreset);
  if(!pr){document.getElementById("pg-workout").innerHTML=`<div style="color:var(--text3);font-size:13px;padding:20px 0">Пресет не найден</div>`;return;}
  const w=getW(curPreset);
  const chips=D.presets.map(p=>`<button class="chip${p.id===curPreset?" on":""}" onclick="switchPreset('${p.id}')">${p.name}</button>`).join("")+`<button class="chip dim" onclick="goNewPreset()">+ новый</button>`;

  let html=`<div class="chips">${chips}</div>
  <div class="drow"><span class="dlbl">дата:</span><input type="date" class="dinp" value="${w.date||today()}" onchange="getW('${curPreset}').date=this.value;sl()"></div>`;

  let totalVol=0,totalKcal=0;

  (pr.items||[]).forEach((item,idx)=>{
    const dAttr=`draggable="true" ondragstart="dStart(event,'${curPreset}',${idx})" ondragover="dOver(event,'${curPreset}',${idx})" ondrop="dDrop(event,'${curPreset}',${idx})" ondragend="dEnd(event)"`;
    if(item.type==="ex"){
      const ex=getEx(item.id);if(!ex)return;
      const sets=getSets(curPreset,item.id);
      const pr2=calcPR(item.id);
      const du=ex.defaultUnit||"кг";
      const bw=!!ex.bodyweight;const lbs=isLbs(item.id);
      const vol=calcVol(item.id,sets);const kcal=calcKcalEx(item.id,sets);
      totalVol+=vol;totalKcal+=kcal;
      const base=baseW(item.id);
      let h1="",h2="";
      if(bw){h1="±кг";h2=du==="сек"?"сек":"повт";}
      else if(du==="повт"){h1="";h2="повт";}
      else if(du==="сек"){h1="";h2="сек";}
      else{h1=lbs?"фунты":"кг";h2="повт";}
      const unitBtn=du!=="сек"&&du!=="повт"&&!bw?`<button class="bxs${lbs?" on":""}" onclick="toggleUnit('${item.id}')">${lbs?"ф→кг":"кг→ф"}</button>`:"";
      let binfo="";
      if(base>0){
        if(bw&&ex.bwFactor&&ex.bwFactor<1)binfo=`<div class="binfo">частичный вес тела: ${base.toFixed(1)} кг (×${ex.bwFactor}) · ±отяг.</div>`;
        else if(bw)binfo=`<div class="binfo">вес тела: ${base} кг · ±отяг./резинка</div>`;
        else binfo=`<div class="binfo">гриф/база: ${base} кг</div>`;
      }
      // prev vol for delta
      const hist=getHist(item.id);
      const prevVol=hist.length?calcVol(item.id,hist[hist.length-1].sets):null;
      const maxV=hist.length?Math.max(...hist.map(h=>calcVol(item.id,h.sets))):0;
      html+=`<div class="card" id="ci-${idx}" ${dAttr}>
        <div class="ch"><div class="cn"><span class="drag-handle">⠿</span>${ex.name}</div>
        <div class="ca">${pr2?`<span class="badge">PR ${pr2}</span>`:""}${unitBtn}<button class="bxs" onclick="addSet('${curPreset}','${item.id}')">+ подход</button></div></div>
        ${binfo}
        <div class="sh"><span>#</span><span>${h1}</span><span>${h2}</span><span></span></div>
        <div id="sets-${item.id}">${sets.map((s,i)=>setRowHTML(curPreset,item.id,i,s,null)).join("")}</div>
        ${buildVolBlock(item.id,vol,prevVol,maxV,du,kcal)}
        ${buildHist(item.id)}
      </div>`;
    } else if(item.type==="ss"){
      const ss=getSS(item.id);if(!ss)return;
      const rounds=getSSRounds(curPreset,item.id);
      const pr2=calcPRSS(item.id);
      const vol=calcVolSS(item.id,rounds);const kcal=calcKcalSS(item.id,rounds);
      totalVol+=vol;totalKcal+=kcal;

      let innerHTML="";
      rounds.forEach((round,ri)=>{
        innerHTML+=`<div style="${ri>0?"margin-top:10px;padding-top:10px;border-top:1px solid var(--border);":""}">
          <div style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:6px;">Раунд ${ri+1} <button class="ds" style="font-size:13px;" onclick="delSSRound('${curPreset}','${item.id}',${ri})">×</button></div>`;
        (ss.exIds||[]).forEach(exId=>{
          const ex=getEx(exId);if(!ex)return;
          const s=round[exId]||{weight:"",reps:"",adj:""};
          const du=ex.defaultUnit||"кг";const bw=!!ex.bodyweight;const lbs=isLbs(exId);
          let h1="",h2="";
          if(bw){h1="±кг";h2=du==="сек"?"сек":"повт";}
          else if(du==="повт"||du==="сек"){h1="";h2=du;}
          else{h1=lbs?"фунты":"кг";h2="повт";}
          innerHTML+=`<div class="ss-ex">
            <div class="ss-ex-name">${ex.name}</div>
            <div class="sh"><span>#</span><span>${h1}</span><span>${h2}</span><span></span></div>
            ${setRowHTML(curPreset,exId,ri,s,item.id)}
          </div>`;
        });
        innerHTML+=`</div>`;
      });

      const hist=getSSHist(item.id);
      const prevVol=hist.length?calcVolSS(item.id,hist[hist.length-1].rounds):null;
      const maxV=hist.length?Math.max(...hist.map(h=>calcVolSS(item.id,h.rounds))):0;

      html+=`<div class="ss-card" id="ci-${idx}" ${dAttr}>
        <div class="ss-header">
          <div style="display:flex;align-items:center;gap:8px;"><span class="drag-handle" style="font-size:14px;">⠿</span><span class="ss-label">суперсет · ${ss.name}</span>${pr2?`<span class="badge">${pr2}</span>`:""}</div>
          <button class="bxs" onclick="addSSRound('${curPreset}','${item.id}')">+ раунд</button>
        </div>
        <div class="ss-body">
          ${innerHTML}
          ${buildVolBlock(item.id,vol,prevVol,maxV,"кг",kcal)}
          ${buildHistSS(item.id)}
        </div>
      </div>`;
    }
  });

  // total row
  if(totalVol>0||totalKcal>0){
    html+=`<div class="total-row"><span class="total-item">Итого объём: <span>${Math.round(totalVol)} кг·повт</span></span><span class="total-item">~<span>${Math.round(totalKcal)} ккал</span></span></div>`;
  }

  document.getElementById("pg-workout").innerHTML=html;
}

// ── drag & drop ───────────────────────────────────────────────────────────────
function dStart(e,pid,idx){
  dragSrc={pid,idx};
  e.currentTarget.classList.add("dragging");
  e.dataTransfer.effectAllowed="move";
  e.dataTransfer.setData("text/plain",String(idx));
}
function dOver(e,pid,idx){
  e.preventDefault();e.stopPropagation();
  e.dataTransfer.dropEffect="move";
  document.querySelectorAll(".card,.ss-card").forEach(el=>el.classList.remove("drag-over"));
  e.currentTarget.classList.add("drag-over");
  dragOver_={pid,idx};
}
function dDrop(e,pid,idx){
  e.preventDefault();e.stopPropagation();
  if(!dragSrc||dragSrc.pid!==pid||dragSrc.idx===idx)return;
  const pr=getPr(pid);if(!pr?.items)return;
  const[moved]=pr.items.splice(dragSrc.idx,1);
  let target=idx;if(dragSrc.idx<idx)target=idx;
  pr.items.splice(target,0,moved);
  dragSrc=null;sl();renderWorkout();
}
function dEnd(e){
  dragSrc=null;
  document.querySelectorAll(".card,.ss-card").forEach(el=>el.classList.remove("dragging","drag-over"));
}

// same for settings list
let dragSrcSettings=null;
function dStartSettings(e,listId,idx){dragSrcSettings={listId,idx};e.dataTransfer.effectAllowed="move";}
function dOverSettings(e,listId,idx){e.preventDefault();e.currentTarget.classList.add("drag-over-item");}
function dDropSettings(e,listId,idx){
  e.preventDefault();e.currentTarget.classList.remove("drag-over-item");
  if(!dragSrcSettings||dragSrcSettings.listId!==listId||dragSrcSettings.idx===idx)return;
  // reorder preset items
  const pr=getPr(listId);
  if(pr?.items){const[m]=pr.items.splice(dragSrcSettings.idx,1);pr.items.splice(idx,0,m);sl();renderSettings();}
  // reorder ss exIds
  const ss=getSS(listId);
  if(ss?.exIds){const[m]=ss.exIds.splice(dragSrcSettings.idx,1);ss.exIds.splice(idx,0,m);sl();renderSettings();}
}
function dEndSettings(e){e.currentTarget.classList.remove("drag-over-item");}

        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">${availEx.map(ex=>`<button class="ba sm ghost" onclick="addToPr('${pr.id}','ex','${ex.id}')">${ex.name}</button>`).join("")}</div>`:""}

        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">${availSS.map(ss=>`<button class="ba sm ghost" onclick="addToPr('${pr.id}','ss','${ss.id}')">${ss.name}</button>`).join("")}</div>`:""}

      const newExBtn=showNewExForm===pr.id?`<div style="background:var(--bg3);border-radius:var(--rs);padding:10px;margin-top:6px;">${newExFormHTML(`createExInPr('${pr.id}')`)}</div>`

        <button class="ba" onclick="editPreset='${pr.id}';showNewExForm=false;showNewSSForm=false;renderSettings()">изменить</button></div>`;
    }

  // exercises
  html+=`<div class="ss-sec"><div class="st">Упражнения</div>`;
  D.exercises.forEach(ex=>{
    if(editEx===ex.id){
      html+=`<div class="editor">${exEditFormHTML(ex)}</div>`;
    } else {
      const du=ex.defaultUnit||"кг";
      const meta=[du,ex.bodyweight?`тело${ex.bwFactor?` ×${ex.bwFactor}`:""}`:ex.hasBar?"гриф":""].filter(Boolean).join(" · ");
      const hLen=(D.history[ex.id]||[]).length;
      html+=`<div class="srow"><div><div class="slbl">${ex.name}</div><div class="ssub">${meta}${hLen?` · ${hLen} зап.`:""}</div></div>
        <button class="ba" onclick="editEx='${ex.id}';renderSettings()">изм.</button></div>`;
    }
  });
  html+=`<div style="margin-top:10px;">${showNewExForm==="global"?`<div class="editor">${newExFormHTML("createExGlobal()")}</div>`:
    `<button class="ba" onclick="showNewExForm='global';renderSettings()">+ создать упражнение</button>`}</div></div>`;

  // supersets
  html+=`<div class="ss-sec"><div class="st">Суперсеты</div>`;
  D.supersets.forEach(ss=>{
    if(editSS===ss.id){
      const exOrder=(ss.exIds||[]).map((exId,idx)=>{
        const ex=getEx(exId);
        return`<div class="drag-item" draggable="true" ondragstart="dStartSettings(event,'${ss.id}',${idx})" ondragover="dOverSettings(event,'${ss.id}',${idx})" ondrop="dDropSettings(event,'${ss.id}',${idx})" ondragend="dEndSettings(event)">
          <span style="color:var(--text3);font-size:13px;">⠿</span>
          <span class="ecl">${ex?ex.name:exId}</span>
          <button class="ba sm ghost" onclick="removeExFromSS('${ss.id}',${idx})">убрать</button>
        </div>`;
      }).join("");
      const usedIds=ss.exIds||[];
      const availForSS=D.exercises.filter(e=>!usedIds.includes(e.id));
      html+=`<div class="editor">
        <input class="einp" value="${ss.name}" oninput="getSS('${ss.id}').name=this.value;sl()">
        <div style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:6px;">Порядок упражнений (перетащи):</div>

          <div style="display:flex;flex-wrap:wrap;gap:4px;">${availForSS.map(e=>`<button class="ba sm ghost" onclick="addExToSS('${ss.id}','${e.id}')">${e.name}</button>`).join("")}</div>`:""}
        <div class="br" style="margin-top:10px;">
          <button class="ba primary" onclick="editSS=null;renderSettings()">Готово</button>
          <button class="ba danger" onclick="askDeleteSS('${ss.id}')">Удалить</button>
        </div>
      </div>`;
    } else {
      const hLen=(D.ssHistory[ss.id]||[]).length;
      html+=`<div class="srow"><div><div class="slbl">${ss.name}</div><div class="ssub">${(ss.exIds||[]).length} упр.${hLen?` · ${hLen} зап.`:""}</div></div>
        <button class="ba" onclick="editSS='${ss.id}';renderSettings()">изм.</button></div>`;
    }
  });
  html+=`<div style="margin-top:10px;">${showNewSSForm==="global"?`<div class="editor">${newSSFormHTML("createSSGlobal()")}</div>`:
    `<button class="ba" onclick="showNewSSForm='global';renderSettings()">+ создать суперсет</button>`}</div></div>`;

  // reset
  const hasCustomDefaults=!!localStorage.getItem("gym_v11_defaults");
  const myDefaultsRow=hasCustomDefaults
    ?'<div class="srow"><div><div class="slbl">Сбросить к моим настройкам</div><div class="ssub">откат к сохранённой точке. история сохранится.</div></div><button class="ba danger" onclick="askResetToMine()">Сброс</button></div>'
    :"";
  html+=`<div class="ss-sec"><div class="st">Сброс</div>
    <div class="srow"><div><div class="slbl">Сохранить мои настройки</div><div class="ssub">текущие упражнения, пресеты и настройки станут точкой отката</div></div>
    <button class="ba" onclick="saveMyDefaults()">Сохранить</button></div>
    ${myDefaultsRow}
    <div class="srow"><div><div class="slbl">Сбросить к заводским</div><div class="ssub">упражнения, пресеты, настройки → исходные. история сохранится.</div></div>
    <button class="ba danger" onclick="askReset()">Сброс</button></div>
  </div>`;

  document.getElementById("pg-settings").innerHTML=html;
}

// ── export render ─────────────────────────────────────────────────────────────
function renderExport(){
  const allDates=new Set();
  D.exercises.forEach(ex=>(D.history[ex.id]||[]).forEach(h=>allDates.add(h.date)));
  D.supersets.forEach(ss=>(D.ssHistory[ss.id]||[]).forEach(h=>allDates.add(h.date)));
  const dates=[...allDates].sort().reverse();
  let html=`<div class="expnote">Просмотр и скачивание истории.</div>
  <div style="margin-bottom:16px;">
    <div style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:8px;">просмотр по дате:</div>
    <select class="esel" id="exp-date-sel" onchange="renderExpPreview(this.value)" style="margin-bottom:0;">
      <option value="">— выбери дату —</option>
      ${dates.map(d=>`<option value="${d}">${d}</option>`).join("")}
    </select>
    <div id="exp-preview"></div>
  </div>
  <button class="expbtn" onclick="exportAll()">📥 Скачать всю историю (CSV)</button>
  ${D.exercises.map(ex=>`<button class="expbtn" onclick="exportEx('${ex.id}')">${ex.name}</button>`).join("")}
  ${D.supersets.map(ss=>`<button class="expbtn" onclick="exportSS('${ss.id}')">${ss.name} (суперсет)</button>`).join("")}`;
  document.getElementById("pg-export").innerHTML=html;
}

function renderExpPreview(date){
  if(!date){document.getElementById("exp-preview").innerHTML="";return;}
  let html=`<div class="exp-preview"><div style="font-size:12px;font-weight:500;margin-bottom:10px;">${date}</div>`;
  let found=false;let totalKcal=0;
  D.exercises.forEach(ex=>{
    const h=(D.history[ex.id]||[]).find(h=>h.date===date);if(!h)return;found=true;
    const du=ex.defaultUnit||"кг";const vol=calcVol(ex.id,h.sets);const kcal=calcKcalEx(ex.id,h.sets);totalKcal+=kcal;
    const sStr=h.sets.map((s,i)=>`${i+1}: ${fmtSetHist(ex.id,s)}`).join("  ");
    html+=`<div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:500;">${ex.name} <span style="font-size:11px;color:var(--text3);font-weight:400;">${fmtVol(vol,du)}</span></div>
      <div style="font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text2);">${sStr}</div>
      <div style="font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);">~${Math.round(kcal)} ккал</div>
      <div style="margin-top:4px;"><button class="ba sm ghost" onclick="openEditHist('ex','${ex.id}','${date}')">редактировать</button></div>
    </div>`;
  });
  D.supersets.forEach(ss=>{
    const h=(D.ssHistory[ss.id]||[]).find(h=>h.date===date);if(!h)return;found=true;
    const vol=calcVolSS(ss.id,h.rounds);const kcal=calcKcalSS(ss.id,h.rounds);totalKcal+=kcal;
    const rStr=h.rounds.map((round,i)=>{const parts=(ss.exIds||[]).map(exId=>fmtSetHist(exId,round[exId]||{}));return`${i+1}: ${parts.join(" + ")}`;}).join("  ");
    html+=`<div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:500;">${ss.name} <span style="font-size:11px;color:var(--text3);font-weight:400;">~${Math.round(vol)} кг·повт</span></div>
      <div style="font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text2);">${rStr}</div>
      <div style="font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);">~${Math.round(kcal)} ккал</div>
      <div style="margin-top:4px;"><button class="ba sm ghost" onclick="openEditHist('ss','${ss.id}','${date}')">редактировать</button></div>
    </div>`;
  });
  if(!found)html+=`<div class="sk">нет данных за эту дату</div>`;
  else html+=`<div style="font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--accent);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">Итого: ~${Math.round(totalKcal)} ккал</div>`;
  html+=`</div>`;
  document.getElementById("exp-preview").innerHTML=html;
}

// ── edit history in modal ─────────────────────────────────────────────────────
function openEditHist(type,id,date){
  if(type==="ex"){
    const ex=getEx(id);if(!ex)return;
    const h=(D.history[id]||[]).find(h=>h.date===date);if(!h)return;
    const du=ex.defaultUnit||"кг";const bw=!!ex.bodyweight;
    const sHTML=h.sets.map((s,i)=>{
      const v1=bw?`<input type="number" step="0.5" placeholder="±кг" value="${s.adj||""}" oninput="editHistSetField('ex','${id}','${date}',${i},'adj',this.value)" style="width:70px;font-family:'IBM Plex Mono',monospace;padding:4px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;text-align:center;">`:`<input type="number" step="0.5" placeholder="${du}" value="${s.weight||""}" oninput="editHistSetField('ex','${id}','${date}',${i},'weight',this.value)" style="width:70px;font-family:'IBM Plex Mono',monospace;padding:4px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;text-align:center;">`;
      const v2=`<input type="number" step="1" placeholder="${du==="сек"?"сек":"повт"}" value="${s.reps||""}" oninput="editHistSetField('ex','${id}','${date}',${i},'reps',this.value)" style="width:70px;font-family:'IBM Plex Mono',monospace;padding:4px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;text-align:center;">`;
      return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span style="font-size:12px;color:var(--text3);font-family:'IBM Plex Mono',monospace;width:20px;">${i+1}</span>${v1}${v2}</div>`;
    }).join("");
    showModal(`Ред. ${ex.name} · ${date}`,"",
      [{label:"Сохранить",cls:"primary",fn:`saveEditHist('ex','${id}','${date}')`},{label:"Отмена",fn:"closeModal()"}]);
    document.querySelector(".modal-text").innerHTML=sHTML;
  } else {
    const ss=getSS(id);if(!ss)return;
    const h=(D.ssHistory[id]||[]).find(h=>h.date===date);if(!h)return;
    let rHTML=h.rounds.map((round,ri)=>{
      const parts=(ss.exIds||[]).map(exId=>{
        const ex=getEx(exId);if(!ex)return"";
        const s=round[exId]||{};
        return`<div style="margin-bottom:4px;"><span style="font-size:11px;color:var(--text3);">${ex.name}</span><div style="display:flex;gap:6px;margin-top:3px;">
          <input type="number" step="0.5" placeholder="вес" value="${s.weight||s.adj||""}" oninput="editHistSSField('${id}','${date}',${ri},'${exId}','weight',this.value)" style="width:70px;font-family:'IBM Plex Mono',monospace;padding:4px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;text-align:center;">
          <input type="number" step="1" placeholder="повт" value="${s.reps||""}" oninput="editHistSSField('${id}','${date}',${ri},'${exId}','reps',this.value)" style="width:70px;font-family:'IBM Plex Mono',monospace;padding:4px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;text-align:center;">
        </div></div>`;
      }).join("");
      return`<div style="margin-bottom:10px;"><div style="font-size:11px;color:var(--text2);font-family:'IBM Plex Mono',monospace;margin-bottom:4px;">Раунд ${ri+1}</div>${parts}</div>`;
    }).join("");
    showModal(`Ред. ${ss.name} · ${date}`,"",
      [{label:"Сохранить",cls:"primary",fn:`saveEditHist('ss','${id}','${date}')`},{label:"Отмена",fn:"closeModal()"}]);
    document.querySelector(".modal-text").innerHTML=rHTML;
  }
}
function editHistSetField(type,id,date,i,field,val){
  if(type==="ex"){const h=(D.history[id]||[]).find(h=>h.date===date);if(h&&h.sets[i])h.sets[i][field]=val;}
}
function editHistSSField(ssId,date,ri,exId,field,val){
  const h=(D.ssHistory[ssId]||[]).find(h=>h.date===date);if(h&&h.rounds[ri])h.rounds[ri][exId][field]=val;
}
async function saveEditHist(type,id,date){
  closeModal();sl();
  if(type==="ex")await gsSet("hist2_"+id,D.history[id]);
  else await gsSet("ssHist_"+id,D.ssHistory[id]);
  showToast("история обновлена");renderWorkout();if(curPage==="export")renderExport();
}

// ── modals ────────────────────────────────────────────────────────────────────
function showModal(title,text,btns){
  const bHTML=btns.map(b=>`<button class="ba${b.cls?" "+b.cls:""}" onclick="${b.fn}">${b.label}</button>`).join("");
  document.getElementById("modal-root").innerHTML=`<div class="modal-bg"><div class="modal"><div class="modal-title">${title}</div><div class="modal-text">${text}</div><div class="modal-btns">${bHTML}</div></div></div>`;
}
function closeModal(){document.getElementById("modal-root").innerHTML="";}

function askDeleteEx(id){const ex=getEx(id);if(!ex)return;showModal("Удалить упражнение?",`«${ex.name}» удалится из всех пресетов и суперсетов. История сохранится.`,[{label:"Удалить",cls:"danger",fn:`deleteEx('${id}')`},{label:"Отмена",fn:"closeModal()"}]);}
function deleteEx(id){
  D.exercises=D.exercises.filter(e=>e.id!==id);
  D.supersets.forEach(ss=>{ss.exIds=(ss.exIds||[]).filter(e=>e!==id);});
  D.presets.forEach(pr=>{pr.items=(pr.items||[]).filter(i=>!(i.type==="ex"&&i.id===id));});
  editEx=null;closeModal();sl();renderSettings();showToast("удалено, история сохранена");
}
function askDeleteSS(id){const ss=getSS(id);if(!ss)return;showModal("Удалить суперсет?",`«${ss.name}» удалится. История суперсета сохранится.`,[{label:"Удалить",cls:"danger",fn:`deleteSS('${id}')`},{label:"Отмена",fn:"closeModal()"}]);}
function deleteSS(id){
  D.supersets=D.supersets.filter(s=>s.id!==id);
  D.presets.forEach(pr=>{pr.items=(pr.items||[]).filter(i=>!(i.type==="ss"&&i.id===id));});
  editSS=null;closeModal();sl();renderSettings();showToast("суперсет удалён");
}
function askDeletePr(id){const pr=getPr(id);if(!pr)return;showModal("Удалить пресет?",`«${pr.name}» будет удалён. Упражнения и история останутся.`,[{label:"Удалить",cls:"danger",fn:`deletePr('${id}')`},{label:"Отмена",fn:"closeModal()"}]);}
function deletePr(id){
  D.presets=D.presets.filter(p=>p.id!==id);
  if(curPreset===id)curPreset=D.presets[0]?.id||"";
  editPreset=null;closeModal();sl();renderSettings();showToast("пресет удалён");
}
function askDelHist(type,id,date){
  const allDates=[];
  if(type==="ex")D.exercises.forEach(ex=>{if((D.history[ex.id]||[]).some(h=>h.date===date))allDates.push(1);});
  D.supersets.forEach(ss=>{if((D.ssHistory[ss.id]||[]).some(h=>h.date===date))allDates.push(1);});
  const multi=allDates.length>1;
  if(multi)showModal("Удалить запись?",`Удалить только это или всю тренировку за ${date}?`,[
    {label:"Всю тренировку",cls:"danger",fn:`delWholeDay('${date}')`},
    {label:"Только это",fn:`delHistEntry('${type}','${id}','${date}')`},
    {label:"Отмена",fn:"closeModal()"},
  ]);
  else showModal("Удалить запись?",`Запись за ${date}. Удалить?`,[
    {label:"Удалить",cls:"danger",fn:`delHistEntry('${type}','${id}','${date}')`},{label:"Отмена",fn:"closeModal()"},
  ]);
}
async function delWholeDay(date){
  closeModal();
  for(const ex of D.exercises){if(D.history[ex.id]){D.history[ex.id]=D.history[ex.id].filter(h=>h.date!==date);await gsSet("hist2_"+ex.id,D.history[ex.id]);}}
  for(const ss of D.supersets){if(D.ssHistory[ss.id]){D.ssHistory[ss.id]=D.ssHistory[ss.id].filter(h=>h.date!==date);await gsSet("ssHist_"+ss.id,D.ssHistory[ss.id]);}}
  sl();showToast("тренировка удалена");renderWorkout();
}
async function delHistEntry(type,id,date){
  closeModal();
  if(type==="ex"){if(!D.history[id])return;D.history[id]=D.history[id].filter(h=>h.date!==date);sl();await gsSet("hist2_"+id,D.history[id]);}
  else{if(!D.ssHistory[id])return;D.ssHistory[id]=D.ssHistory[id].filter(h=>h.date!==date);sl();await gsSet("ssHist_"+id,D.ssHistory[id]);}
  showToast("запись удалена");renderWorkout();
}
function saveMyDefaults(){
  const snap={settings:JSON.parse(JSON.stringify(D.settings)),exercises:JSON.parse(JSON.stringify(D.exercises)),supersets:JSON.parse(JSON.stringify(D.supersets)),presets:JSON.parse(JSON.stringify(D.presets))};
  try{localStorage.setItem("gym_v11_defaults",JSON.stringify(snap));}catch(e){}
  showToast("настройки сохранены как мои по умолчанию");renderSettings();
}
function askResetToMine(){showModal("Сбросить к моим настройкам?","Упражнения, пресеты и настройки вернутся к сохранённой точке. История сохраняется.",[{label:"Сбросить",cls:"danger",fn:"doResetToMine()"},{label:"Отмена",fn:"closeModal()"}]);}
function doResetToMine(){
  try{
    const snap=JSON.parse(localStorage.getItem("gym_v11_defaults")||"null");
    if(!snap){showToast("нет сохранённых настроек");closeModal();return;}
    const hist=D.history,ssHist=D.ssHistory;
    D.settings=snap.settings;D.exercises=snap.exercises;D.supersets=snap.supersets;D.presets=snap.presets;
    D.history=hist;D.ssHistory=ssHist;
    curPreset=D.presets[0]?.id||"mon";
    closeModal();sl();renderSettings();renderWorkout();showToast("сброшено к моим настройкам");
  }catch(e){showToast("ошибка сброса");closeModal();}
}
function askReset(){showModal("Сбросить настройки?","Упражнения, суперсеты, пресеты и настройки → по умолчанию. История сохраняется.",[{label:"Сбросить",cls:"danger",fn:"doReset()"},{label:"Отмена",fn:"closeModal()"}]);}
function doReset(){
  const hist=D.history,ssHist=D.ssHistory;
  D=freshD();D.history=hist;D.ssHistory=ssHist;
  curPreset=D.presets[0]?.id||"mon";
  closeModal();sl();renderSettings();renderWorkout();showToast("настройки сброшены");
}

// ── interactions ──────────────────────────────────────────────────────────────
function switchPreset(id){curPreset=id;renderWorkout();}
function goNewPreset(){showPage("settings");createPr();}

function createPr(){
  const id="cp_"+Date.now();
  D.presets.push({id,name:"Новый пресет",items:[]});
  sl();editPreset=id;showNewExForm=false;showNewSSForm=false;renderSettings();
}
function removePrItem(pid,idx){const pr=getPr(pid);if(!pr)return;pr.items.splice(idx,1);sl();renderSettings();}
function addToPr(pid,type,id){const pr=getPr(pid);if(!pr)return;pr.items.push({type,id});sl();renderSettings();}

function removeExFromSS(ssId,idx){const ss=getSS(ssId);if(!ss)return;ss.exIds.splice(idx,1);sl();renderSettings();}
function addExToSS(ssId,exId){const ss=getSS(ssId);if(!ss)return;if(!ss.exIds.includes(exId))ss.exIds.push(exId);sl();renderSettings();}

function readNewExForm(){
  const name=(document.getElementById("nex-name")?.value||"").trim();
  if(!name){showToast("введи название");return null;}
  const defaultUnit=document.getElementById("nex-unit")?.value||"кг";
  const hasBar=document.getElementById("nex-bar")?.checked||false;
  const bodyweight=document.getElementById("nex-bw")?.checked||false;
  const hasBwf=bodyweight&&document.getElementById("nex-bwf")?.checked;
  const bwFactor=hasBwf?parseFloat(document.getElementById("nex-bwfactor")?.value)||0.5:null;
  const kcalFactor=parseFloat(document.getElementById("nex-kcal")?.value)||0.10;
  const id="ex_"+Date.now();
  const ex={id,name,defaultUnit,hasBar,bodyweight,kcalFactor};
  if(bwFactor)ex.bwFactor=bwFactor;
  return ex;
}
function createExInPr(pid){const ex=readNewExForm();if(!ex)return;D.exercises.push(ex);addToPr(pid,"ex",ex.id);showNewExForm=false;sl();renderSettings();showToast("создано");}
function createExGlobal(){const ex=readNewExForm();if(!ex)return;D.exercises.push(ex);showNewExForm=false;sl();renderSettings();showToast("создано");}

function readNewSSForm(){
  const name=(document.getElementById("nss-name")?.value||"").trim();
  const checked=[...document.querySelectorAll(".ss-ex-chk:checked")].map(cb=>cb.value);
  if(!name){showToast("введи название");return null;}
  if(checked.length<2){showToast("выбери минимум 2 упражнения");return null;}
  return{id:"ss_"+Date.now(),name,exIds:checked,kcalFactor:0.09};
}
function createSSInPr(pid){const ss=readNewSSForm();if(!ss)return;D.supersets.push(ss);addToPr(pid,"ss",ss.id);showNewSSForm=false;sl();renderSettings();showToast("суперсет создан");}
function createSSGlobal(){const ss=readNewSSForm();if(!ss)return;D.supersets.push(ss);showNewSSForm=false;sl();renderSettings();showToast("суперсет создан");}

function saveEx(exId){
  const idx=D.exercises.findIndex(e=>e.id===exId);if(idx<0)return;
  const name=(document.getElementById("eex-name")?.value||"").trim();if(!name){showToast("введи название");return;}
  const defaultUnit=document.getElementById("eex-unit")?.value||"кг";
  const hasBar=document.getElementById("eex-bar")?.checked||false;
  const bodyweight=document.getElementById("eex-bw")?.checked||false;
  const hasBwf=bodyweight&&document.getElementById("eex-bwf")?.checked;
  const bwFactor=hasBwf?parseFloat(document.getElementById("eex-bwfactor")?.value)||0.5:null;
  const kcalFactor=parseFloat(document.getElementById("eex-kcal")?.value)||0.10;
  const updated={...D.exercises[idx],name,defaultUnit,hasBar,bodyweight,kcalFactor};
  if(bwFactor)updated.bwFactor=bwFactor;else delete updated.bwFactor;
  D.exercises[idx]=updated;
  editEx=null;sl();renderSettings();showToast("сохранено");
}

function toggleUnit(exId){const cur=dispUnit(exId);D.unitPref[exId]=cur==="ф"?"kg":"lbs";sl();renderWorkout();}

function updSet(pid,exId,i,field,val,fromLbs){
  const s=getSets(pid,exId);if(!s[i])s[i]={};
  s[i][field]=field==="weight"&&fromLbs?lbsToKg(parseFloat(val)||0):val;
  sl();refreshVolEx(exId);
}
function updAdj(pid,exId,i,val){updSet(pid,exId,i,"adj",val,false);}

function updSSSet(pid,ssId,ri,exId,field,val,fromLbs){
  const rounds=getSSRounds(pid,ssId);if(!rounds[ri])return;
  if(!rounds[ri][exId])rounds[ri][exId]={weight:"",reps:"",adj:""};
  rounds[ri][exId][field]=field==="weight"&&fromLbs?lbsToKg(parseFloat(val)||0):val;
  sl();refreshVolSS(ssId);
}

function refreshVolEx(exId){
  const el=document.getElementById("vol-"+exId);if(!el)return;
  el.outerHTML=buildVol(exId,getSets(curPreset,exId));
}
function refreshVolSS(ssId){
  const el=document.getElementById("vol-"+ssId);if(!el)return;
  el.outerHTML=buildVolSS(ssId,getSSRounds(curPreset,ssId));
}

function addSet(pid,exId){
  const s=getSets(pid,exId);s.push({weight:"",reps:"",adj:""});sl();
  const c=document.getElementById("sets-"+exId);
  if(c)c.insertAdjacentHTML("beforeend",setRowHTML(pid,exId,s.length-1,s[s.length-1],null));
}
function addSSRound(pid,ssId){
  const rounds=getSSRounds(pid,ssId);
  const ss=getSS(ssId);const empty={};
  (ss?.exIds||[]).forEach(id=>{empty[id]={weight:"",reps:"",adj:""};});
  rounds.push(JSON.parse(JSON.stringify(empty)));
  sl();renderWorkout();
}
function delSet(pid,exId,i){const s=getSets(pid,exId);if(s.length<=1)return;s.splice(i,1);sl();renderWorkout();}
function delSSRound(pid,ssId,i){const r=getSSRounds(pid,ssId);if(r.length<=1)return;r.splice(i,1);sl();renderWorkout();}

async function saveDay(){
  const pr=getPr(curPreset);if(!pr)return;
  const w=getW(curPreset);const date=w.date||today();
  const exIds=(pr.items||[]).filter(i=>i.type==="ex").map(i=>i.id);
  const ssIds=(pr.items||[]).filter(i=>i.type==="ss").map(i=>i.id);
  const already=exIds.some(id=>(D.history[id]||[]).some(h=>h.date===date))
    ||ssIds.some(id=>(D.ssHistory[id]||[]).some(h=>h.date===date));
  if(already){showModal("Перезаписать?",`За ${date} уже есть данные. Перезаписать?`,[{label:"Перезаписать",cls:"danger",fn:"doSaveDay()"},{label:"Отмена",fn:"closeModal()"}]);return;}
  await doSaveDay();
}

async function doSaveDay(){
  closeModal();
  const pr=getPr(curPreset);if(!pr)return;
  const w=getW(curPreset);const date=w.date||today();

  // save exercises
  for(const item of (pr.items||[])){
    if(item.type==="ex"){
      const ex=getEx(item.id);if(!ex)continue;
      if(!D.history[item.id])D.history[item.id]=[];
      const hist=D.history[item.id];
      const snap=getSets(curPreset,item.id).map(s=>({...s,baseSnap:baseW(item.id)}));
      const entry={date,sets:JSON.parse(JSON.stringify(snap))};
      const idx=hist.findIndex(h=>h.date===date);
      if(idx>=0)hist[idx]=entry;else hist.push(entry);
      if(hist.length>20)hist.splice(0,hist.length-20);
    } else if(item.type==="ss"){
      if(!D.ssHistory[item.id])D.ssHistory[item.id]=[];
      const hist=D.ssHistory[item.id];
      const rounds=getSSRounds(curPreset,item.id);
      const snap=rounds.map(round=>{
        const r={};
        const ss=getSS(item.id);
        (ss?.exIds||[]).forEach(exId=>{r[exId]={...round[exId],baseSnap:baseW(exId)};});
        return r;
      });
      const entry={date,rounds:JSON.parse(JSON.stringify(snap))};
      const idx=hist.findIndex(h=>h.date===date);
      if(idx>=0)hist[idx]=entry;else hist.push(entry);
      if(hist.length>20)hist.splice(0,hist.length-20);
    }
  }
  sl();

  // sync to cloud
  for(const item of (pr.items||[])){
    if(item.type==="ex")await gsSet("hist2_"+item.id,D.history[item.id]);
    else if(item.type==="ss")await gsSet("ssHist_"+item.id,D.ssHistory[item.id]);
  }
  await gsSet("workout_"+curPreset,w);
  await gsSet("settings",D.settings);
  await gsSet("presets",D.presets);
  await gsSet("exercises",D.exercises);
  await gsSet("supersets",D.supersets);

  // build summary
  let totalVol=0,totalKcal=0,lines=[];
  (pr.items||[]).forEach(item=>{
    if(item.type==="ex"){const vol=calcVol(item.id,getSets(curPreset,item.id));const kcal=calcKcalEx(item.id,getSets(curPreset,item.id));totalVol+=vol;totalKcal+=kcal;if(vol>0)lines.push(`${getEx(item.id)?.name}: ${Math.round(vol)} кг·повт`);}
    else if(item.type==="ss"){const vol=calcVolSS(item.id,getSSRounds(curPreset,item.id));const kcal=calcKcalSS(item.id,getSSRounds(curPreset,item.id));totalVol+=vol;totalKcal+=kcal;if(vol>0)lines.push(`${getSS(item.id)?.name}: ~${Math.round(vol)} кг·повт`);}
  });
  const msg=lines.slice(0,5).join("\n")+(lines.length>5?"\n...":"");
  showModal("Молодец! Хорошая тренировка 💪",`Объём: ${Math.round(totalVol)} кг·повт\n~${Math.round(totalKcal)} ккал\n\n${msg}`,[{label:"Закрыть",fn:"closeModal()"}]);
  renderWorkout();
}

function clearDay(){
  const pr=getPr(curPreset);if(!pr)return;
  const w=getW(curPreset);w.sets={};w.ssSets={};sl();renderWorkout();
}

function exportAll(){
  let rows=["дата,тип,упражнение/суперсет,раунд/подход,вес(кг),повт/сек,объём,ккал"];
  D.exercises.forEach(ex=>{
    (D.history[ex.id]||[]).forEach(h=>{
      h.sets.forEach((s,i)=>{
        const base=parseFloat(s.baseSnap)||baseW(ex.id);const adj=parseFloat(s.adj)||0;const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;
        const total=ex.bodyweight?base+adj:base+w;const vol=calcVol(ex.id,[{...s,baseSnap:base}]);
        rows.push([h.date,"упражнение",`"${ex.name}"`,i+1,total||0,r,Math.round(vol),Math.round(calcKcalEx(ex.id,[{...s,baseSnap:base}]))].join(","));
      });
    });
  });
  D.supersets.forEach(ss=>{
    (D.ssHistory[ss.id]||[]).forEach(h=>{
      h.rounds.forEach((round,ri)=>{
        (ss.exIds||[]).forEach(exId=>{
          const ex=getEx(exId);if(!ex)return;const s=round[exId]||{};
          const base=parseFloat(s.baseSnap)||baseW(exId);const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;
          const total=ex.bodyweight?base+(parseFloat(s.adj)||0):base+w;
          rows.push([h.date,"суперсет",`"${ss.name} — ${ex.name}"`,ri+1,total||0,r,Math.round(effW(exId,s)*r),Math.round(effW(exId,s)*r*(ex.kcalFactor||0.1))].join(","));
        });
      });
    });
  });
  dlCSV(rows.join("\n"),"gym_history.csv");
}
function exportEx(id){
  const ex=getEx(id);if(!ex)return;
  let rows=["дата,подход,вес(кг),повт/сек,объём,ккал"];
  (D.history[id]||[]).forEach(h=>{
    h.sets.forEach((s,i)=>{
      const base=parseFloat(s.baseSnap)||baseW(id);const adj=parseFloat(s.adj)||0;const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;
      const total=ex.bodyweight?base+adj:base+w;const vol=calcVol(id,[{...s,baseSnap:base}]);
      rows.push([h.date,i+1,total||0,r,Math.round(vol),Math.round(calcKcalEx(id,[{...s,baseSnap:base}]))].join(","));
    });
  });
  dlCSV(rows.join("\n"),ex.name.replace(/\s+/g,"_")+".csv");
}
function exportSS(id){
  const ss=getSS(id);if(!ss)return;
  let rows=["дата,раунд,упражнение,вес(кг),повт"];
  (D.ssHistory[id]||[]).forEach(h=>{
    h.rounds.forEach((round,ri)=>{
      (ss.exIds||[]).forEach(exId=>{const ex=getEx(exId);if(!ex)return;const s=round[exId]||{};
        const base=parseFloat(s.baseSnap)||baseW(exId);const w=parseFloat(s.weight)||0;const r=parseFloat(s.reps)||0;
        rows.push([h.date,ri+1,`"${ex.name}"`,ex.bodyweight?base+(parseFloat(s.adj)||0):base+w,r].join(","));
      });
    });
  });
  dlCSV(rows.join("\n"),ss.name.replace(/\s+/g,"_")+".csv");
}
function dlCSV(c,f){const b=new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8;"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=f;a.click();URL.revokeObjectURL(u);}

function showPage(name){
  curPage=name;
  if(name!=="settings"){editPreset=null;editEx=null;editSS=null;showNewExForm=false;showNewSSForm=false;}
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nb").forEach((b,i)=>b.classList.toggle("active",["workout","settings","export"][i]===name));
  document.getElementById("pg-"+name).classList.add("active");
  document.getElementById("bbar").style.display=name==="workout"?"flex":"none";
  if(name==="settings")renderSettings();
  if(name==="export")renderExport();
  if(name==="workout")renderWorkout();
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}

async function loadCloud(){
  const settings=await gsGet("settings");if(settings)D.settings=settings;
  const presets=await gsGet("presets");if(presets)D.presets=presets;
  const exercises=await gsGet("exercises");if(exercises)D.exercises=exercises;
  const supersets=await gsGet("supersets");if(supersets)D.supersets=supersets;
  for(const ex of D.exercises){const h=await gsGet("hist2_"+ex.id);if(h)D.history[ex.id]=h;}
  for(const ss of D.supersets){const h=await gsGet("ssHist_"+ss.id);if(h)D.ssHistory[ss.id]=h;}
  for(const pr of D.presets){const ww=await gsGet("workout_"+pr.id);if(ww)D.workouts[pr.id]=ww;}
  if(!D.ssHistory)D.ssHistory={};
  curPreset=D.presets[0]?.id||"mon";
  sl();renderWorkout();renderSettings();renderExport();
}

renderWorkout();renderSettings();renderExport();
ssync("busy","загрузка...");
loadCloud();
